<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>EkoSnake Monitor 📊</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 1.5rem;
        }
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #22c55e, #6ee7b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
        }
        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            flex-wrap: wrap;
        }
        .status-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
            margin-right: 0.3rem;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .status-dot.paused { background: #f59e0b; animation: none; }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 0.4rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.6);
            padding: 0.4rem 0.9rem;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s ease;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); }
        .filter-btn.active {
            background: rgba(16,185,129,0.2);
            border-color: rgba(16,185,129,0.5);
            color: #6ee7b7;
            box-shadow: inset 0 -2px 0 #22c55e;
        }

        /* Table */
        .table-wrap {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 0.8rem;
            max-width: 520px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.4);
            padding: 0.5rem 0.4rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-weight: 600;
        }
        td {
            padding: 0.55rem 0.4rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.9rem;
        }
        tr { transition: background 0.3s ease; }
        tr.flash { background: rgba(16,185,129,0.15); }
        .rank { text-align: center; font-weight: 700; min-width: 2rem; }
        .rank.gold { color: #fbbf24; }
        .rank.silver { color: #94a3b8; }
        .rank.bronze { color: #d97706; }
        .name { font-weight: 600; }
        .cls { font-size: 0.75rem; color: rgba(255,255,255,0.45); text-align: center; }
        .score { font-weight: 900; color: #6ee7b7; text-align: right; font-variant-numeric: tabular-nums; }
        .empty { text-align: center; color: rgba(255,255,255,0.3); padding: 2rem; }

        /* Stats */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 0.6rem 1rem;
            text-align: center;
            min-width: 80px;
        }
        .stat-val { font-size: 1.4rem; font-weight: 900; color: #6ee7b7; }
        .stat-label { font-size: 0.65rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 0.1rem; }

        /* Interval control */
        .interval-ctrl {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
        }
        .interval-ctrl button {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.6);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.75rem;
            transition: all 0.15s ease;
        }
        .interval-ctrl button:hover { background: rgba(255,255,255,0.12); }
        .interval-ctrl button.active { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.5); color: #6ee7b7; }
    </style>
</head>
<body>

<div class="header">
    <h1>🐍 EkoSnake Monitor</h1>
    <div class="status-bar">
        <span><span class="status-dot" id="statusDot"></span> <span id="statusText">Ansluter...</span></span>
        <span id="lastUpdate"></span>
        <span id="playerCount"></span>
    </div>
</div>

<div class="stats-row" id="statsRow"></div>

<div class="controls" id="filterBar"></div>

<div class="table-wrap">
    <div id="tableContent"><p class="empty">Laddar...</p></div>
</div>

<div class="interval-ctrl" id="intervalBar"></div>

<script>
const APP_KEY = "HakanEkoSnake_Ekologi2026_v1";
const BASE_URL = "https://keyvalue.immanuel.co/api/KeyVal";
const CLASS_NAMES = {A:'BJKA1-25', D:'BJKD1-25', E:'BJKE1-25', X:'Annan'};

let pollMs = 5000;
let paused = false;
let timer = null;
let filter = '';
let prevData = '';
let scores = [];
let clsMap = {};

async function kvGet(key) {
    const r = await fetch(`${BASE_URL}/GetValue/${APP_KEY}/${key}?t=${Date.now()}`, {cache:'no-store'});
    let t = await r.text();
    if (!t || t==='0' || t.includes('not found')) return '';
    return t.replace(/"/g,'');
}

async function poll() {
    try {
        // Read NEW keys (HS2 + HS2C)
        const raw = await kvGet('HS2');
        const clsRaw = await kvGet('HS2C');
        clsMap = {};
        if (clsRaw) clsRaw.split('|').forEach(s => { const p=s.split('_'); if(p[0]) clsMap[p[0].toLowerCase()]=p[1]||''; });

        const merged = {};
        // Parse new format: Name_Score
        if (raw) raw.split('|').forEach(s => {
            const p = s.split('_');
            if (p[0]) merged[p[0].toLowerCase()] = { name:p[0], score:parseInt(p[1])||0, cls:clsMap[p[0].toLowerCase()]||'' };
        });
        // Parse OLD key (Name_Score_Words_Class) — fallback for cached clients
        const oldRaw = await kvGet('HS_EKOSNAKE');
        if (oldRaw) oldRaw.split('|').forEach(s => {
            const p = s.split('_');
            if (!p[0]) return;
            const key = p[0].toLowerCase();
            const sc = parseInt(p[1])||0;
            const cls = p[3]||'';
            if (!merged[key] || sc > merged[key].score) {
                merged[key] = { name:p[0], score:sc, cls: cls || (merged[key]?.cls||'') };
            }
            if (cls && merged[key]) merged[key].cls = merged[key].cls || cls;
        });

        const newData = JSON.stringify(merged);
        const changed = newData !== prevData;
        prevData = newData;

        scores = Object.values(merged).sort((a,b) => b.score - a.score);

        renderStats();
        renderFilters();
        renderTable(changed);
        updateStatus(true);
    } catch(e) {
        updateStatus(false);
    }
}

function renderStats() {
    const total = scores.length;
    const top = scores[0]?.score || 0;
    const classCount = {};
    scores.forEach(s => { const c = s.cls || '?'; classCount[c] = (classCount[c]||0)+1; });
    const classes = Object.keys(classCount).filter(c=>c!=='?').length;

    document.getElementById('statsRow').innerHTML = `
        <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">Spelare</div></div>
        <div class="stat-card"><div class="stat-val">${top.toLocaleString('sv')}</div><div class="stat-label">Toppresultat</div></div>
        <div class="stat-card"><div class="stat-val">${classes}</div><div class="stat-label">Klasser</div></div>
    `;
    document.getElementById('playerCount').textContent = `${total} spelare`;
}

function renderFilters() {
    const filters = [{code:'',label:'Alla'},{code:'A',label:'A1-25'},{code:'D',label:'D1-25'},{code:'E',label:'E1-25'}];
    document.getElementById('filterBar').innerHTML = filters.map(f =>
        `<button class="filter-btn ${filter===f.code?'active':''}" onclick="setFilter('${f.code}')">${f.label}</button>`
    ).join('');
}

function renderTable(changed) {
    const filtered = filter ? scores.filter(s=>s.cls===filter) : scores;
    if (!filtered.length) {
        document.getElementById('tableContent').innerHTML = '<p class="empty">Inga resultat' + (filter ? ' för denna klass' : '') + ' ännu 🏆</p>';
        return;
    }
    let html = '<table><thead><tr><th style="text-align:center">#</th><th style="text-align:left">Namn</th><th style="text-align:center">Klass</th><th style="text-align:right">Poäng</th></tr></thead><tbody>';
    filtered.forEach((s, i) => {
        const rc = i===0?'gold':i===1?'silver':i===2?'bronze':'';
        const ri = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
        const cd = CLASS_NAMES[s.cls] || s.cls || '—';
        const flash = changed ? ' flash' : '';
        html += `<tr class="${flash}"><td class="rank ${rc}">${ri}</td><td class="name">${esc(s.name)}</td><td class="cls">${esc(cd)}</td><td class="score">${s.score.toLocaleString('sv')}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('tableContent').innerHTML = html;

    // Remove flash after animation
    if (changed) setTimeout(() => document.querySelectorAll('.flash').forEach(el => el.classList.remove('flash')), 600);
}

function updateStatus(ok) {
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    const ts = document.getElementById('lastUpdate');
    if (ok) {
        dot.className = 'status-dot' + (paused ? ' paused' : '');
        text.textContent = paused ? 'Pausad' : 'Live';
        ts.textContent = new Date().toLocaleTimeString('sv');
    } else {
        dot.style.background = '#ef4444';
        text.textContent = 'Anslutningsfel';
    }
}

function setFilter(cls) { filter = cls; renderFilters(); renderTable(false); }
function setPollRate(s) { pollMs = s * 1000; restartTimer(); renderIntervalBar(); }
function renderIntervalBar() {
    const rates = [3,5,10,30];
    let html = '<span>Uppdatering:</span>';
    rates.forEach(s => {
        const a = (!paused && pollMs === s*1000) ? ' active' : '';
        html += `<button class="${a}" onclick="setPollRate(${s})">${s}s</button>`;
    });
    html += `<button onclick="togglePause()" id="pauseBtn">${paused ? '▶ Fortsätt' : '⏸ Pausa'}</button>`;
    document.getElementById('intervalBar').innerHTML = html;
}
function togglePause() {
    paused = !paused;
    if (paused) { clearInterval(timer); updateStatus(true); }
    else { poll(); restartTimer(); }
    renderIntervalBar();
}
function restartTimer() {
    clearInterval(timer);
    if (!paused) timer = window.setInterval(poll, pollMs);
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

// Start
renderIntervalBar();
poll();
timer = window.setInterval(poll, pollMs);
</script>
</body>
</html>
