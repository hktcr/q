<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlassPuls: Ekologi Avstämning</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --bg: #0a0f0a;
            --surface: rgba(30, 41, 59, 0.6);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --correct: #10b981;
            --incorrect: #ef4444;
            --gold: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === BACKGROUND === */
        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            background: url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=1920&q=80') center/cover no-repeat;
        }
        .bg-layer::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(160deg, rgba(5,10,5,0.92) 0%, rgba(10,20,15,0.82) 100%);
        }

        /* === LAYOUT === */
        .app {
            position: relative; z-index: 1;
            min-height: 100vh; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; padding: clamp(0.5rem, 2vh, 1.5rem) 1rem;
        }

        /* === PROGRESS BAR === */
        .progress-bar-wrap {
            position: fixed; top: 0; left: 0; right: 0;
            height: 6px; background: rgba(255,255,255,0.08); z-index: 10;
        }
        .progress-bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--primary), #34d399);
            border-radius: 0 3px 3px 0;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* === STEP INDICATOR === */
        .step-indicator {
            position: fixed; top: 1.5rem; right: 2rem;
            font-size: 1rem; font-weight: 700;
            color: var(--text-muted); z-index: 10;
            letter-spacing: 1px;
        }
        .step-indicator .current { color: var(--primary); font-size: 1.4rem; }

        /* === CARD === */
        .card {
            width: 96vw; max-width: 1400px;
            background: rgba(10, 15, 10, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: clamp(1.2rem, 4vh, 4rem) clamp(1.2rem, 4vw, 5rem);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            transform: translateX(0); opacity: 1;
            transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease;
        }
        .card.exit-left  { transform: translateX(-120px); opacity: 0; }
        .card.enter-right { transform: translateX(120px); opacity: 0; }

        /* === QUESTION === */
        .q-number {
            font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 3px; color: var(--primary);
            font-weight: 800; margin-bottom: 0.75rem;
        }
        .q-text {
            font-size: clamp(1.2rem, 3.5vw, 2.5rem);
            font-weight: 600; line-height: 1.55;
            margin-bottom: clamp(1.5rem, 4vh, 3.5rem);
        }
        .q-text .blank {
            display: inline-block;
            min-width: clamp(60px, 10vw, 100px);
            border-bottom: 3px solid var(--primary);
            margin: 0 5px;
        }

        /* === OPTIONS (Multiple Choice) === */
        .options { display: flex; flex-direction: column; gap: 0.85rem; }

        .opt {
            display: flex; align-items: center; gap: 1.5rem;
            padding: clamp(0.8rem, 2vh, 2.2rem) clamp(1.4rem, 2.5vw, 3rem);
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 14px; cursor: pointer;
            font-size: clamp(1.1rem, 2.2vw, 1.8rem);
            line-height: 1.45;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .opt:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
        .opt.selected { border-color: var(--primary); background: rgba(16,185,129,0.1); }

        .opt .letter {
            flex-shrink: 0; width: clamp(36px, 4vw, 55px); height: clamp(36px, 4vw, 55px);
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-weight: 700; font-size: clamp(0.95rem, 1.5vw, 1.4rem);
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }
        
        .opt.correct-opt { border-color: var(--correct) !important; background: rgba(16,185,129,0.15) !important; }
        .opt.correct-opt .letter { background: var(--correct) !important; color: #fff !important; }
        .opt.wrong-opt { border-color: var(--incorrect) !important; background: rgba(239,68,68,0.12) !important; opacity: 0.85; }
        .opt.wrong-opt .letter { background: var(--incorrect) !important; color: #fff !important; }
        .opt.dimmed { opacity: 0.4; }

        /* === MATCHING UI === */
        .match-container {
            display: flex; gap: 1rem; margin-bottom: 1rem;
        }
        @media(max-width: 600px) {
            .match-container { flex-direction: column; gap: 2rem; }
        }
        .match-col { flex: 1; display: flex; flex-direction: column; gap: 1rem; }
        .match-col-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 1rem; text-align: center; }
        
        .match-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.02);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: clamp(0.8rem, 2vh, 1.8rem); gap: 1rem;
            transition: all 0.3s;
        }
        .match-item {
            padding: clamp(1rem, 2vw, 1.8rem);
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px; cursor: pointer;
            text-align: center; font-weight: 600;
            font-size: clamp(1rem, 1.8vw, 1.4rem);
            transition: all 0.2s ease;
            user-select: none;
        }
        .match-item:hover { background: rgba(255,255,255,0.08); }
        .match-item.selected { border-color: var(--gold); background: rgba(245, 158, 11, 0.15); box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); }
        .match-item.matched { cursor: default; opacity: 0.6; }
        
        /* Match colors */
        .matched-0 { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.15) !important; color: #93c5fd; }
        .matched-1 { border-color: #ec4899 !important; background: rgba(236, 72, 153, 0.15) !important; color: #f9a8d4; }
        .matched-2 { border-color: #8b5cf6 !important; background: rgba(139, 92, 246, 0.15) !important; color: #c4b5fd; }
        .matched-3 { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.15) !important; color: #6ee7b7; }

        /* === LUCKTEXT UI === */
        .luck-input {
            width: clamp(100px, 20vw, 220px); 
            padding: 0.2rem 0.5rem; 
            font-size: inherit; 
            text-align: center; 
            border-radius: 8px; 
            border: 2px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.4); 
            color: var(--gold); 
            font-weight: bold; 
            outline: none; 
            display: inline-block; 
            margin: 0 0.5rem;
            transition: all 0.3s ease;
        }
        .luck-input:placeholder-shown {
            border-color: var(--gold);
            background: rgba(245, 158, 11, 0.1);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.2);
        }
        .luck-input:focus {
            border-color: var(--gold);
            background: rgba(245, 158, 11, 0.2);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
        }

        /* === CATEGORIZE UI === */
        .cat-buckets { display: flex; gap: 1rem; margin-bottom: 2rem; }
        @media(max-width: 600px) { .cat-buckets { flex-direction: column; } }
        
        .bucket {
            flex: 1; min-height: 120px;
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 16px; padding: 1rem;
            display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
            transition: all 0.3s;
            cursor: pointer;
        }
        .bucket-title { font-weight: 700; color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .bucket.highlight { border-color: var(--gold); background: rgba(245, 158, 11, 0.05); }
        
        .cat-items {
            display: flex; flex-wrap: wrap; gap: 0.8rem; justify-content: center;
            min-height: 60px;
        }
        .chip {
            padding: clamp(0.8rem, 1.5vw, 1.5rem) clamp(1.5rem, 3vw, 2.5rem);
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50px; font-weight: 600;
            font-size: clamp(1rem, 1.8vw, 1.4rem);
            cursor: pointer; transition: all 0.2s;
            user-select: none;
        }
        .chip:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
        .chip.selected { border-color: var(--gold); background: rgba(245, 158, 11, 0.2); transform: scale(1.05); }
        
        .bucket .chip { width: 100%; text-align: center; border-color: rgba(255,255,255,0.05); background: rgba(0,0,0,0.3); }

        /* === VISUAL LABEL (IMAGE-LABEL) === */
        .vis-zone {
            border: 2px dashed rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.4);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: #d1d5db;
            transition: all 0.2s;
        }
        .vis-zone:hover { background: rgba(255,255,255,0.1); border-color: white; }
        .vis-zone.filled {
            border: 2px solid var(--gold);
            background: rgba(245, 158, 11, 0.2);
            color: white;
        }
        .vis-zone.correct-zone {
            border-color: var(--correct);
            background: rgba(16, 185, 129, 0.3);
            color: #a7f3d0;
        }
        .vis-zone.wrong-zone {
            border-color: var(--incorrect);
            background: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .chip.hidden { display: none !important; }

        /* === FEEDBACK === */
        .feedback {
            margin-top: 1.5rem; padding: 1.2rem 1.5rem;
            border-radius: 14px; font-size: 1rem;
            line-height: 1.5; display: none;
            border-left: 4px solid;
            animation: fadeSlideUp 0.4s ease-out;
        }
        .feedback.show { display: block; }
        .feedback.ok  { background: rgba(16,185,129,0.1); border-color: var(--correct); color: #a7f3d0; }
        .feedback.nok { background: rgba(239,68,68,0.1);  border-color: var(--incorrect); color: #fca5a5; }

        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* === BUTTONS === */
        .next-btn, .start-btn {
            display: none; margin-top: 2rem; width: 100%; padding: 1.1rem;
            font-family: inherit; font-size: 1.1rem; font-weight: 700;
            color: #fff; background: var(--primary);
            border: none; border-radius: 14px; cursor: pointer; letter-spacing: 0.5px;
            transition: all 0.25s ease; animation: fadeSlideUp 0.4s ease-out;
        }
        .next-btn:hover, .start-btn:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 8px 24px var(--primary-glow); }
        .next-btn.show, .start-btn.show { display: block; }

        .retry-btn {
            margin-top: 2rem; padding: 1rem 3rem; font-family: inherit; font-size: 1.1rem; font-weight: 700;
            color: var(--primary); background: transparent;
            border: 2px solid var(--primary); border-radius: 14px; cursor: pointer; transition: all 0.25s ease;
        }
        .retry-btn:hover { background: var(--primary); color: #fff; }

        /* === INTRO & RESULTS === */
        .intro { text-align: center; }
        .intro .badge { display: inline-block; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 3px; color: var(--primary); font-weight: 800; margin-bottom: 1rem; }
        .intro h1 { font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 900; line-height: 1.15; margin-bottom: 0.75rem; }
        .intro .sub { font-size: 1.15rem; color: var(--text-muted); margin-bottom: 2.5rem; line-height: 1.5; }
        
        .results { text-align: center; }
        .results .emoji { font-size: 4rem; margin-bottom: 1rem; }
        .results h2 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; margin-bottom: 0.5rem; }
        .results .score-line { font-size: 1.3rem; color: var(--text-muted); margin-bottom: 2.5rem; }
        .results .score-line strong { color: var(--primary); font-size: 1.6rem; }
        .result-row { display: flex; align-items: center; gap: 1rem; padding: 0.9rem 1.2rem; border-radius: 12px; margin-bottom: 0.6rem; font-size: 1rem; text-align: left; }
        .result-row.ok  { background: rgba(16,185,129,0.1); }
        .result-row.nok { background: rgba(239,68,68,0.08); }
        #offlineBanner { position: fixed; top: 0; left: 0; right: 0; background: #ef4444; color: #fff; text-align: center; padding: 0.5rem; font-weight: bold; z-index: 9999; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="offlineBanner">📡 Tappat anslutningen! Försöker återansluta...</div>
    <div class="bg-layer"></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="step-indicator" id="stepIndicator" style="display:none;"><span class="current" id="stepCurrent">1</span> / <span id="stepTotal">10</span></div>

    <div class="app">
        <div class="card" id="card"></div>
    </div>

    <!-- Teacher message overlay -->
    <div id="fullScreenMsg" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:99999; justify-content:center; align-items:center; flex-direction:column; padding:2rem; text-align:center; transition: background 0.3s ease;">
        <h1 id="fullScreenMsgText" style="font-size:max(8vw, 3rem); font-weight:900; color:white; text-transform:uppercase; text-shadow: 0 4px 20px rgba(0,0,0,0.5); line-height:1.1; margin:0;"></h1>
    </div>

    <script>
    const APP_KEY = "HakanGlosPuls_Glosor2026_v2"; // Unik synknyckel
    const BASE_URL = "https://keyvalue.immanuel.co/api/KeyVal";
    let currentSessionId = Date.now().toString();

    // Levenshtein distance algorithm for spell-checking
    function levenshtein(a, b) {
        if(a.length === 0) return b.length;
        if(b.length === 0) return a.length;
        var matrix = [];
        for(var i = 0; i <= b.length; i++){ matrix[i] = [i]; }
        for(var j = 0; j <= a.length; j++){ matrix[0][j] = j; }
        for(var i = 1; i <= b.length; i++){
            for(var j = 1; j <= a.length; j++){
                if(b.charAt(i-1) == a.charAt(j-1)){
                    matrix[i][j] = matrix[i-1][j-1];
                } else {
                    matrix[i][j] = Math.min(matrix[i-1][j-1] + 1, Math.min(matrix[i][j-1] + 1, matrix[i-1][j] + 1));
                }
            }
        }
        return matrix[b.length][a.length];
    }

    // --- TWO-WAY STATS API ---
    async function sendStat(type) {
        if(isTeacher) return;
        try {
            // Jitter for mitigating race conditions
            await new Promise(r => setTimeout(r, Math.random() * 800));
            
            const statKey = `S_${currentSessionId}_Q${currentQ}`;
            let res = await fetch(`${BASE_URL}/GetValue/${APP_KEY}/${statKey}?t=` + Date.now(), { cache: 'no-store' });
            let text = await res.text();
            
            let stats = {};
            if (text && text !== '0' && !text.includes('not found')) {
                text.replace(/"/g, '').split('|').forEach(p => {
                    let [k,v] = p.split('=');
                    if(k && v) stats[k] = parseInt(v);
                });
            }
            stats[type] = (stats[type] || 0) + 1;
            
            let newStr = Object.keys(stats).map(k => `${k}=${stats[k]}`).join('|');
            await fetch(`${BASE_URL}/UpdateValue/${APP_KEY}/${statKey}/${encodeURIComponent(newStr)}`, { method: 'POST', cache: 'no-store' });
        } catch(e) { console.warn("Stat sync failed", e); } // Graceful degradation
    }

    const questions = [
        { 
            num: 1, 
            type: "multiple-choice", 
            text: "Ordet ekologi kommer från de grekiska orden \"Oikos\" och \"logos\". Vad betyder ordet egentligen?", 
            options: [{letter: "A", text: "Djuren"}, {letter: "B", text: "Läran om huset (Jorden)"}, {letter: "C", text: "Växterna"}, {letter: "D", text: "Rymden"}],
            correct: "B", 
            feedbackOk: "Exakt! 'Oikos' betyder hus och 'logos' betyder lära. Ekologi är alltså läran om vårt gemensamma hus, Jorden, och hur allt liv samspelar här.", 
            feedbackNok: "Tyvärr fel. Rätt svar är B (Läran om huset). 'Oikos' är grekiska för hus. Inom ekologin ser vi hela Jorden som vårt gemensamma hus där allt liv hänger ihop." 
        },
        { 
            num: 2, 
            type: "categorize", 
            text: "Kategorisera miljöfaktorerna nedan!", 
            categories: ["Abiotiska faktorer", "Biotiska faktorer"], 
            items: [
                {word: "Solljus", cat: 0},
                {word: "Temperatur", cat: 0},
                {word: "Rovdjur", cat: 1},
                {word: "Bakterier", cat: 1},
                {word: "Vind", cat: 0}
            ], 
            feedbackOk: "Klockrent! Abiotiska faktorer är den icke-levande miljön (solljus, temperatur, vind). Biotiska faktorer är de levande organismerna (rovdjur, bakterier).", 
            feedbackNok: "Något hamnade fel. Solljus, temperatur och vind är Abiotiska (icke-levande fysiska faktorer), medan rovdjur och bakterier är Biotiska (levande organismer)." 
        },
        { 
            num: 3, 
            type: "match", 
            text: "Koppla ihop rätt nivå i ekosystemet!", 
            pairs: [
                {left: "Biotop", right: "Själva naturtypen (t.ex. en stubbe eller granskog)"}, 
                {left: "Population", right: "Alla individer av SAMMA art i ett område"}, 
                {left: "Samhälle", right: "Alla OLIKA arter som lever tillsammans"}
            ], 
            feedbackOk: "Snyggt! En biotop är platsen, en population är individerna av samma art, och samhället är nätverket av alla arter som lever där.", 
            feedbackNok: "Någon koppling blev fel. Biotop = själva naturtypen, Population = alla av en specifik art, Samhälle = alla olika arter i ekosystemet tillsammans." 
        },
        { 
            num: 4, 
            type: "multiple-choice", 
            text: "Vad är skillnaden mellan en näringskedja och en näringsväv?", 
            options: [
                {letter: "A", text: "En näringskedja har flera toppkonsumenter, en väv har bara en."}, 
                {letter: "B", text: "En näringsväv är flera korsande näringskedjor som sitter ihop."}, 
                {letter: "C", text: "Näringsvävar finns bara i havet, näringskedjor på land."}, 
                {letter: "D", text: "Det är exakt samma sak."}
            ], 
            correct: "B", 
            feedbackOk: "Helt rätt! I verkligheten är det sällan enkla 'raka rör', eftersom de flesta djur äter flera olika saker. Detta bildar ett komplext nätverk, en näringsväv.", 
            feedbackNok: "Fel svar. Rätt svar är B. I naturen äter många djur flera olika saker. När man slår ihop flera raka näringskedjor bildas en mer realistisk och komplex näringsväv." 
        },
        { 
            num: 5, 
            type: "match", 
            text: "Koppla ihop rätt roll i näringskedjan!", 
            pairs: [
                {left: "Producent", right: "Bygger sin egen mat (fotosyntes)"}, 
                {left: "Konsument", right: "Måste äta andra för att få energi"}, 
                {left: "Toppkonsument", right: "Saknar naturliga fiender"}
            ], 
            feedbackOk: "Helt rätt! Producenter fångar solens energi, konsumenter äter denna energi, och toppkonsumenter står högst upp i näringskedjan utan naturliga rovdjur.", 
            feedbackNok: "Något blev fel. Rätt är: Producent (tillverkar energi via fotosyntes), Konsument (måste äta för energi), Toppkonsument (högst upp, saknar naturliga fiender)." 
        },
        { 
            num: 6, 
            type: "multiple-choice", 
            text: "Utan <span class='blank'></span> (svampar & bakterier) skulle kretsloppet stanna av. De städar upp döda växter och djur så näringen kan användas igen.", 
            options: [{letter: "A", text: "Toppkonsumenter"}, {letter: "B", text: "Producenter"}, {letter: "C", text: "Nedbrytare"}, {letter: "D", text: "Parasiter"}],
            correct: "C", 
            feedbackOk: "Snyggt! Nedbrytarna fungerar som naturens återvinningsstation. Utan dem skulle jorden täckas av döda växter och djur, och näringen skulle ta slut.", 
            feedbackNok: "Fel svar. Rätt svar är C (Nedbrytare). Det är maskar, svampar och bakterier som äter dött material och frigör näringen till jorden igen." 
        },
        { 
            num: 7, 
            type: "categorize", 
            text: "Kategorisera vilket typ av samspel (symbios) det är!", 
            categories: ["Mutualism", "Parasitism"], 
            items: [
                {word: "Mykorrhiza (Svamp+Träd)", cat: 0},
                {word: "Tarmbakterier i oss", cat: 0},
                {word: "Fästing på en hund", cat: 1},
                {word: "Bandmask", cat: 1}
            ], 
            feedbackOk: "Korrekt! Mutualism är 'Win-Win' (mykorrhiza, tarmbakterier) där båda vinner. Parasitism är 'Win-Lose' där den ena stjäl energi och den andra skadas.", 
            feedbackNok: "Något hamnade fel. Mutualism = ömsesidig nytta där båda gynnas (mykorrhiza, tarmbakterier). Parasitism = en vinner och den andra skadas (fästing, bandmask)." 
        },
        { 
            num: 8, 
            type: "multiple-choice",

    function strToHex(str) { return Array.from(new TextEncoder().encode(str)).map(b => b.toString(16).padStart(2, '0')).join(''); }
    function hexToStr(hex) {
        const bytes = new Uint8Array(Math.ceil(hex.length / 2));
        for (let i = 0; i < bytes.length; i++) bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
        return new TextDecoder().decode(bytes);
    }

            } else if (state.q === -1 && currentQ !== -1) {

                card.innerHTML = `<div class="intro"><div class="emoji" style="font-size:4rem; margin-bottom:1rem;">⏳</div><h2>Väntar...</h2><p class="sub">Lektionen har nollställts.</p></div>`;
            }
        }, 2000);
    }

    function renderIntro() {
        stepIndicator.style.display = 'none'; progressBar.style.width = '0%';
        if (isTeacher) return renderTeacherPanel();
        card.innerHTML = `
            <div class="intro">
                <h1>KlassPuls: Ekologi</h1>
                <div style="display:flex; justify-content:center; gap:1rem; flex-wrap:wrap;">
                    <button class="start-btn show" style="width:auto; padding: 1rem 2.5rem;" onclick="startSyncMode()">🔗 Gå med i klassrummet</button>
                    <button class="retry-btn" style="margin-top:0;" onclick="startSoloMode()">Öva ensam</button>
                </div>
            </div>`;
    }

    function startSoloMode() {
        isSyncMode = false; currentQ = 0; highestActivated = questions.length - 1; answers = {}; activatedQuestions.clear();
        showQuestion(0);
    }

    /* --- SHUFFLE ARRAY HELPER --- */
    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    /* --- RENDERING ENGINE --- */
    let matchState = { left: null, completed: {} };
    let catState = { placements: {} };

    function showQuestion(idx) {
        activatedQuestions.add(idx);
        if (!isSyncMode) {
            stepIndicator.style.display = 'block'; stepCurrent.textContent = idx + 1;
            progressBar.style.width = ((idx) / questions.length * 100) + '%';
        } else {
            stepIndicator.style.display = 'none';
            progressBar.style.width = '100%';
        }
        
        const q = questions[idx];
        
        card.classList.add('exit-left');
        setTimeout(() => {
            card.classList.remove('exit-left'); card.classList.add('enter-right');
            
            let instructionText = '';
            if (q.type === 'multiple-choice') instructionText = "👆 Tryck på det svarsalternativ du tror är rätt.";
            
            else if (q.type === 'lucktext') instructionText = "⌨️ Skriv in det ord som saknas i luckan och tryck på Svara.";
            else if (q.type === 'match') instructionText = "👆 Tryck på ett begrepp och därefter på rätt förklaring för att koppla ihop dem.";
            else if (q.type === 'categorize') instructionText = "👆 Tryck först på ett ord här nere, och därefter på den ruta du vill placera ordet i.";

            let qTextHTML = q.text;
            if (q.type === 'lucktext') {
                qTextHTML = qTextHTML.replace("<span class='blank'></span>", `<input type="text" id="freetextInput" class="luck-input" autocomplete="off" onkeydown="if(event.key==='Enter') submitFreetext()">`);
            }
            let contentHTML = `<div class="q-number">${!isSyncMode ? `Fråga ${idx + 1} av ${questions.length}` : `Fråga ${q.num}`}</div>
                               <div class="q-text" style="line-height:1.6;">${qTextHTML}</div>
                               <div style="font-size:0.9rem; font-weight:600; color:var(--gold); margin-bottom:1.5rem; text-transform:uppercase; letter-spacing:1px; background:rgba(245, 158, 11, 0.1); padding:0.6rem 1rem; border-radius:8px; display:inline-block;">${instructionText}</div>`;
            
            if (q.type === 'multiple-choice') {
                contentHTML += `<div class="options">
                    ${q.options.map(o => `<div class="opt" onclick="selectMC(this, '${o.letter}')"><span class="letter">${o.letter}</span><span>${o.text}</span></div>`).join('')}
                </div>`;
            } 
            else if (q.type === 'lucktext') {
                contentHTML += `<div class="freetext-container" style="display:flex; justify-content:center; margin-top:1.5rem;">
                    <button onclick="submitFreetext()" style="width:100%; max-width:300px; padding:1.2rem; font-size:1.2rem; font-weight:bold; border-radius:12px; background:var(--primary); color:#fff; border:none; cursor:pointer; box-shadow:0 4px 15px rgba(16,185,129,0.3);">Svara / Rätta</button>
                </div>`;
            }
            else if (q.type === 'match') {
                matchState = { left: null, completed: {} };
                const lefts = shuffle(q.pairs.map(p => p.left));
                const rights = shuffle(q.pairs.map(p => p.right));
                contentHTML += `<div class="match-container">
                    <div class="match-col"><div class="match-col-title">Begrepp</div>
                        ${lefts.map(l => `<div class="match-item left-item" data-val="${l}" onclick="selectMatchLeft(this)">${l}</div>`).join('')}
                    </div>
                    <div class="match-col"><div class="match-col-title">Förklaring</div>
                        ${rights.map(r => `<div class="match-item right-item" data-val="${r}" onclick="selectMatchRight(this)">${r}</div>`).join('')}
                    </div>
                </div>`;
            }
            else if (q.type === 'categorize') {
                catState = { placements: {} };
                const words = shuffle(q.items.map(i => i.word));
                contentHTML += `
                    <div class="cat-buckets">
                        ${q.categories.map((c, i) => `<div class="bucket" data-cat="${i}" onclick="selectBucket(this)"><div class="bucket-title">${c}</div></div>`).join('')}
                    </div>
                    <div class="cat-items">
                        ${words.map(w => `<div class="chip" data-val="${w}" onclick="selectCatChip(this, event)">${w}</div>`).join('')}
                    </div>`;
            }
            else if (q.type === 'image-label') {
                visState = { placements: {} };
                const labels = shuffle(q.labels);
                contentHTML += `<div style="position:relative; width:100%; max-width:600px; margin:0 auto 2rem auto; display:flex; justify-content:center;">
                    ${q.html}
                </div>
                <div class="cat-items">
                    ${labels.map(l => `<div class="chip" data-val="${l}" onclick="selectVisLabel(this, event)">${l}</div>`).join('')}
                </div>`;
            }

            contentHTML += `
                <div class="feedback" id="fb"></div>
                ${!isSyncMode ? `<button class="next-btn" id="nextBtn" onclick="nextQuestion()">${idx < questions.length - 1 ? 'Nästa Fråga →' : 'Visa Resultat →'}</button>` : `<div id="syncWaitMsg" style="display:none; text-align:center; margin-top:2rem; color:var(--text-muted); font-weight:600;">Svar registrerat! ⏳ Väntar på Håkan...</div>`}
            `;
            
            card.innerHTML = contentHTML;
            requestAnimationFrame(() => { 
                requestAnimationFrame(() => { 
                    card.classList.remove('enter-right'); 
                    const inputEl = document.getElementById('freetextInput');
                    if(inputEl && !isSyncMode) inputEl.focus();
                }); 
            });
        }, 300);
    }

    /* === VISUAL LABEL UI LOGIC === */
    let visLabelSelected = null;
    let visState = { placements: {} };
    
    window.selectVisLabel = function(el, event) {
        if(navigator.vibrate) navigator.vibrate(10);
        if (answers[currentQ] !== undefined) return;
        if (visLabelSelected === el) {
            visLabelSelected.classList.remove('selected');
            visLabelSelected = null;
            return;
        }
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        visLabelSelected = el;
        if (event) event.stopPropagation();
    };

    window.selectVisZone = function(el) {
        if(navigator.vibrate) navigator.vibrate(10);
        if (answers[currentQ] !== undefined) return;
        if (!visLabelSelected) {
            // Un-place
            if (el.dataset.placed) {
                // Find a hidden chip that matches
                const hiddenChips = Array.from(document.querySelectorAll('.chip.hidden'));
                const chip = hiddenChips.find(c => c.dataset.val === el.dataset.placed);
                if (chip) chip.classList.remove('hidden');
                delete visState.placements[el.id];
                el.innerText = '';
                el.dataset.placed = '';
                el.classList.remove('filled');
            }
            return;
        }
        
        const val = visLabelSelected.dataset.val;
        
        if (el.dataset.placed) {
            const hiddenChips = Array.from(document.querySelectorAll('.chip.hidden'));
            const oldChip = hiddenChips.find(c => c.dataset.val === el.dataset.placed);
            if (oldChip) oldChip.classList.remove('hidden');
        }
        
        el.innerText = val;
        el.dataset.placed = val;
        el.classList.add('filled');
        visState.placements[el.id] = val;
        visLabelSelected.classList.add('hidden');
        visLabelSelected.classList.remove('selected');
        visLabelSelected = null;
        
        const q = questions[currentQ];
        if (Object.keys(visState.placements).length === q.labels.length) {
            let allCorrect = true;
            document.querySelectorAll('.vis-zone').forEach(z => {
                if (z.dataset.placed === z.dataset.correct) {
                    z.classList.add('correct-zone');
                } else {
                    z.classList.add('wrong-zone');
                    allCorrect = false;
                }
            });
            evaluateAnswer(allCorrect);
        }
    };

    function evaluateAnswer(isCorrect) {
        answers[currentQ] = isCorrect;
        const q = questions[currentQ];
        
        if (q.type !== 'multiple-choice') {
            sendStat(isCorrect ? 'ok' : 'nok');
        }

        const fb = document.getElementById('fb');
        fb.className = 'feedback show ' + (isCorrect ? 'ok' : 'nok');
        fb.innerHTML = isCorrect ? '✓ ' + q.feedbackOk : '✗ ' + q.feedbackNok;
        
        if (isCorrect && navigator.vibrate) navigator.vibrate([100]);
        else if (!isCorrect && navigator.vibrate) navigator.vibrate([50, 100, 50]);
        if (!isSyncMode) document.getElementById('nextBtn').classList.add('show');
        else document.getElementById('syncWaitMsg').style.display = 'block';
    }

    /* --- MULTIPLE CHOICE & LUCKTEXT --- */
    
    /* --- FREETEXT LOGIC --- */
    window.submitFreetext = function() {
        if (answers[currentQ] !== undefined) return;
        const q = questions[currentQ];
        const inputEl = document.getElementById('freetextInput');
        const ans = inputEl.value.trim().toLowerCase();
        if (ans === "") return;
        
        inputEl.disabled = true;
        
        let isCorrect = false;
        let isClose = false;
        let bestMatch = "";
        
        for (let c of q.correctAnswers) {
            let dist = levenshtein(c.toLowerCase(), ans);
            if (dist === 0) {
                isCorrect = true; break;
            } else if (dist <= 2 && ans.length >= 4) {
                isClose = true; bestMatch = c;
            }
        }
        
        answers[currentQ] = isCorrect || isClose;
        let statType = isCorrect ? 'ok' : (isClose ? 'close' : 'nok');
        sendStat(statType);
        
        const fb = document.getElementById('fb');
        fb.style.backgroundColor = '';
        
        if (isCorrect) {
            fb.className = 'feedback show ok';
            fb.innerHTML = '✓ ' + q.feedbackOk; 
            inputEl.style.borderColor = 'var(--correct)'; 
            inputEl.style.color = 'var(--correct)';
            if(navigator.vibrate) navigator.vibrate([100]);
        } else if (isClose) {
            fb.className = 'feedback show ok'; 
            fb.style.backgroundColor = '#d97706'; // Orange-ish for typo
            fb.innerHTML = `⚠️ Rätt tänkt, men tänk på stavningen! (Rätt stavas: <strong>${bestMatch}</strong>).<br><br>${q.feedbackOk}`;
            inputEl.style.borderColor = '#d97706';
            inputEl.style.color = '#d97706';
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        } else {
            fb.className = 'feedback show nok';
            fb.innerHTML = '✗ ' + q.feedbackNok; 
            inputEl.style.borderColor = 'var(--incorrect)'; 
            inputEl.style.color = 'var(--incorrect)';
            if(navigator.vibrate) navigator.vibrate([50,100,50]);
        }
        
        if (!isSyncMode) document.getElementById('nextBtn').classList.add('show');
        else document.getElementById('syncWaitMsg').style.display = 'block';
    };

    function selectMC(el, val) {
        if(navigator.vibrate) navigator.vibrate(10);
        if (answers[currentQ] !== undefined) return;
        const q = questions[currentQ];
        const isCorrect = val === q.correct;
        
        sendStat('opt_' + val);
        
        document.querySelectorAll('.opt').forEach(o => {
            o.style.cursor = 'default';
            if (o.dataset.val === q.correct || o.querySelector('.letter').innerText === q.correct) o.classList.add('correct-opt');
            else if (o === el && !isCorrect) o.classList.add('wrong-opt');
            else o.classList.add('dimmed');
        });
        evaluateAnswer(isCorrect);
    }

    /* --- MATCH UI LOGIC --- */
    let matchColors = ['matched-0', 'matched-1', 'matched-2', 'matched-3'];
    function selectMatchLeft(el) {
        if(navigator.vibrate) navigator.vibrate(10);
        if (answers[currentQ] !== undefined || el.classList.contains('matched')) return;
        document.querySelectorAll('.left-item').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        matchState.left = el.dataset.val;
    }
    function selectMatchRight(el) {
        if(navigator.vibrate) navigator.vibrate(10);
        if (answers[currentQ] !== undefined || el.classList.contains('matched') || !matchState.left) return;
        const q = questions[currentQ];
        
        // Mark as matched
        const leftEl = document.querySelector(`.left-item[data-val="${matchState.left}"]`);
        const colorClass = matchColors[Object.keys(matchState.completed).length % matchColors.length];
        
        leftEl.classList.remove('selected');
        leftEl.classList.add('matched', colorClass);
        el.classList.add('matched', colorClass);
        
        matchState.completed[matchState.left] = el.dataset.val;
        matchState.left = null;

        if (Object.keys(matchState.completed).length === q.pairs.length) {
            let allCorrect = true;
            for (let term in matchState.completed) {
                const pair = q.pairs.find(p => p.left === term);
                if (!pair || pair.right !== matchState.completed[term]) allCorrect = false;
            }
            evaluateAnswer(allCorrect);
        }
    }

    /* --- CATEGORIZE UI LOGIC --- */
    let catSelected = null;
    function selectCatChip(el, event) {
        if(navigator.vibrate) navigator.vibrate(10);
        if (answers[currentQ] !== undefined) return;
        
        if (catSelected && el.parentNode.classList.contains('bucket') && catSelected !== el) {
            selectBucket(el.parentNode);
            if (event) event.stopPropagation();
            return;
        }

        document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        catSelected = el;
        if (event) event.stopPropagation();
    }
    function selectBucket(el) {
        if(navigator.vibrate) navigator.vibrate(10);
        if (answers[currentQ] !== undefined || !catSelected) return;
        el.appendChild(catSelected);
        catSelected.classList.remove('selected');
        catState.placements[catSelected.dataset.val] = parseInt(el.dataset.cat);
        catSelected = null;

        const q = questions[currentQ];
        if (Object.keys(catState.placements).length === q.items.length) {
            let allCorrect = true;
            for (let word in catState.placements) {
                const item = q.items.find(i => i.word === word);
                if (!item || item.cat !== catState.placements[word]) allCorrect = false;
            }
            evaluateAnswer(allCorrect);
        }
    }

    function nextQuestion() {
        if (currentQ < questions.length - 1) showQuestion(++currentQ);
        else showResults();
    }

    function showResults() {
        if(syncInterval) clearInterval(syncInterval);
        progressBar.style.width = '100%'; stepIndicator.style.display = 'none'; msgOverlay.style.display = 'none';
        
        let pushedArray = isSyncMode ? Array.from(activatedQuestions).sort((a,b) => a-b) : Array.from({length: questions.length}, (_, i) => i);
        if (pushedArray.length === 0) return card.innerHTML = '<div class="results"><h2>Inga frågor besvarades.</h2></div>';

        let score = 0, resultRows = '';
        for(let i of pushedArray) {
            const ok = answers[i] === true;
            if (ok) score++;
            resultRows += `<div class="result-row ${ok ? 'ok' : 'nok'}"><span class="result-icon">${ok ? '✓' : '✗'}</span><span>Fråga ${questions[i].num}: ${ok ? 'Rätt' : 'Fel'}</span></div>`;
        }

        const pct = score / pushedArray.length;
        const emoji = pct === 1 ? '🌟' : (pct >= 0.6 ? '💚' : (pct >= 0.3 ? '🌱' : '📖'));
        const title = pct === 1 ? 'Full pott!' : (pct >= 0.6 ? 'Snyggt!' : 'På god väg!');

        card.classList.add('exit-left');
        setTimeout(() => {
            card.classList.remove('exit-left'); card.classList.add('enter-right');
            card.innerHTML = `<div class="results"><div class="emoji">${emoji}</div><h2>${title}</h2><p class="score-line">Du hade <strong>${score}</strong> rätt av ${pushedArray.length} möjliga.</p><div style="max-height:250px; overflow-y:auto; margin-bottom:2rem;">${resultRows}</div>${!isSyncMode ? `<button class="retry-btn" onclick="retry()">Kör igen</button>` : ''}</div>`;
            requestAnimationFrame(() => { requestAnimationFrame(() => { card.classList.remove('enter-right'); }); });
        }, 300);
    }

    function retry() { currentQ = -1; highestActivated = -1; answers = {}; activatedQuestions.clear(); renderIntro(); }

                                q.options.map(o => `<div style="${o.letter === q.correct ? 'color:#a7f3d0; font-weight:bold;' : ''}">${o.letter === q.correct ? '✅' : '⬜'} ${o.letter}: ${o.text}</div>`).join('') + `</div>`;

                            </div>`;
                        } else if(q.type === 'match') {
                            previewHTML = `<div style="font-size:0.85rem; color:#9ca3af; margin-bottom:1rem; padding-left:0.8rem; border-left:2px solid rgba(255,255,255,0.1);">` + 
                                q.pairs.map(p => `<div>🔗 <strong style="color:#d1d5db;">${p.left}</strong> ➔ ${p.right}</div>`).join('') + `</div>`;
                        } else if(q.type === 'categorize') {
                            previewHTML = `<div style="font-size:0.85rem; color:#9ca3af; margin-bottom:1rem; padding-left:0.8rem; border-left:2px solid rgba(255,255,255,0.1);">` + 
                                `<div style="margin-bottom:0.3rem;"><strong style="color:#d1d5db;">Kategorier:</strong> ${q.categories.join(' vs ')}</div>` +
                                q.items.map(item => `<div>• ${item.word} ➔ <em style="color:#a7f3d0;">${q.categories[item.cat]}</em></div>`).join('') + `</div>`;
                        } else if(q.type === 'image-label') {
                            previewHTML = `<div style="font-size:0.85rem; color:#9ca3af; margin-bottom:1rem; padding-left:0.8rem; border-left:2px solid rgba(255,255,255,0.1);">` + 
                                `<div><strong>✅ Element:</strong> ${q.labels.join(', ')}</div></div>`;
                        }

                        // Generate Live Stats UI
                        if(q.type === 'multiple-choice') {
                            statsHTML = `
                            <div style="margin-bottom:0.5rem;"><button onclick="pollStats(${i}, this)" style="padding:0.4rem 0.8rem; border-radius:6px; background:var(--accent); color:white; border:none; cursor:pointer; font-weight:bold; transition:all 0.2s;">Hämta Svar</button></div>
                            <div style="display:flex; gap:0.5rem; margin-bottom:1rem; font-size:0.9rem; align-items:center; flex-wrap:wrap;">
                                ${q.options.map(o => `<div style="background:rgba(255,255,255,0.1); padding:0.4rem 0.8rem; border-radius:6px;">${o.letter}: <strong id="stat_${i}_opt_${o.letter}">0</strong></div>`).join('')}
                            </div>`;
                        } else if(q.type === 'lucktext') {
                            statsHTML = `
                            <div style="margin-bottom:0.5rem;"><button onclick="pollStats(${i}, this)" style="padding:0.4rem 0.8rem; border-radius:6px; background:var(--accent); color:white; border:none; cursor:pointer; font-weight:bold; transition:all 0.2s;">Hämta Svar</button></div>
                            <div style="display:flex; gap:0.5rem; margin-bottom:1rem; font-size:0.9rem; align-items:center; flex-wrap:wrap;">
                                <div style="background:rgba(16,185,129,0.2); color:#a7f3d0; padding:0.4rem 0.8rem; border-radius:6px;">Rätt: <strong id="stat_${i}_ok">0</strong></div>
                                <div style="background:rgba(217,119,6,0.2); color:#fcd34d; padding:0.4rem 0.8rem; border-radius:6px;">Stavfel: <strong id="stat_${i}_close">0</strong></div>
                                <div style="background:rgba(239,68,68,0.2); color:#fca5a5; padding:0.4rem 0.8rem; border-radius:6px;">Fel: <strong id="stat_${i}_nok">0</strong></div>
                            </div>`;
                        } else {
                            statsHTML = `
                            <div style="margin-bottom:0.5rem;"><button onclick="pollStats(${i}, this)" style="padding:0.4rem 0.8rem; border-radius:6px; background:var(--accent); color:white; border:none; cursor:pointer; font-weight:bold; transition:all 0.2s;">Hämta Svar</button></div>
                            <div style="display:flex; gap:0.5rem; margin-bottom:1rem; font-size:0.9rem; align-items:center; flex-wrap:wrap;">
                                <div style="background:rgba(16,185,129,0.2); color:#a7f3d0; padding:0.4rem 0.8rem; border-radius:6px;">Rätt: <strong id="stat_${i}_ok">0</strong></div>
                                <div style="background:rgba(239,68,68,0.2); color:#fca5a5; padding:0.4rem 0.8rem; border-radius:6px;">Fel: <strong id="stat_${i}_nok">0</strong></div>
                            </div>`;
                        }

                        return `
                        <div id="t-card-${i}" class="opt teacher-q-card" data-qtype="${q.type}" style="height:100%; flex-direction:column; align-items:stretch; background:rgba(255,255,255,0.02); border-color:rgba(255,255,255,0.05); padding:1rem;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;"><span style="font-weight:bold; color:var(--primary);">Fråga ${q.num} <span style="font-size:0.8rem; color:#6b7280; font-weight:normal;">(${q.type})</span></span></div>
                            <div style="font-size:1rem; font-weight:600; margin-bottom:0.8rem;">${q.text.replace('<span class=\'blank\'></span>', '_____')}</div>
                            ${previewHTML}
                            ${statsHTML}
                            <button id="t-btn-${i}" onclick="manualPush(${i})" style="margin-top:auto; background:rgba(16,185,129,0.2); border:1px solid rgba(16,185,129,0.5); color:#fff; padding:0.8rem; border-radius:8px; font-weight:bold; cursor:pointer; width:100%;">🚀 Puscha till klassen</button>
                        </div>
                    `}).join('')}
                </div>
                
                <div style="margin-top:2rem; border-top:1px solid rgba(255,255,255,0.1); padding-top:1rem;">
                    <h4 style="color:var(--text-muted); margin-bottom:1rem; text-transform:uppercase; letter-spacing:1px; font-size:0.85rem;">Historik (${window._currentClassName || 'Denna klass'})</h4>
                    <div id="teacherHistoryList" style="display:flex; flex-direction:column; gap:0.5rem; font-size:0.9rem;"></div>
                </div>

                <div class="opt" onclick="pushQuestion(999)" style="margin-top:1.5rem; border-color:var(--incorrect); justify-content:center; padding:1.2rem; cursor:pointer;">
                    <span style="font-size:1.1rem; font-weight:bold; color:var(--incorrect);">🏁 Avsluta Lektion (Visa resultat)</span>
                </div>
            </div>`;
    }

    window.pollStats = async function(idx, btnEl) {
        if (btnEl) {
            btnEl.dataset.originalText = btnEl.textContent;
            btnEl.textContent = "Hämtar...";
            btnEl.style.opacity = "0.7";
            btnEl.disabled = true;
        }

        const q = questions[idx];
        let keys = [];
        if (q.type === 'multiple-choice') {
            keys = ['opt_A', 'opt_B', 'opt_C', 'opt_D'];
        } else if (q.type === 'lucktext') {
            keys = ['ok', 'close', 'nok'];
        } else {
            keys = ['ok', 'nok'];
        }
        
        const statKey = `S_${currentSessionId}_Q${idx}`;
        try {
            const res = await fetch(`${BASE_URL}/GetValue/${APP_KEY}/${statKey}?t=` + Date.now(), { cache: 'no-store' });
            let text = await res.text();
            let stats = {};
            if (text && text !== '0' && !text.includes('not found')) {
                text.replace(/"/g, '').split('|').forEach(p => {
                    let [k,v] = p.split('=');
                    if(k && v) stats[k] = parseInt(v);
                });
            }
            
            for(let k of keys) {
                const statEl = document.getElementById(`stat_${idx}_${k}`);
                if (statEl) statEl.textContent = stats[k] || 0;
            }
        } catch(e) {
            console.warn("Could not fetch stat", e);
            for(let k of keys) {
                const statEl = document.getElementById(`stat_${idx}_${k}`);
                if (statEl) statEl.textContent = 0;
            }
        }
        
        if (btnEl) {
            btnEl.textContent = "Hämtat!";
            btnEl.style.opacity = "1";
            setTimeout(() => {
                btnEl.textContent = btnEl.dataset.originalText || "Hämta Svar";
                btnEl.disabled = false;
            }, 1000);
        }
    }

    window.resetLesson = async function() {
        const className = prompt("Vilken klass ska du ha nu? (t.ex. 7A)");
        if(className !== null) {
            const safeName = className.trim() || 'Klass';
            const cleanId = safeName.replace(/[^a-zA-Z0-9]/g, '');
            window._pushedQuestions = new Set();
            window._lastPushedIndex = -1; currentMsgColor = 'none'; currentMsgText = '';
            currentSessionId = cleanId + '-' + Date.now().toString();
            window._currentClassName = safeName;
            sessionHistory = {}; // Clear local history for the new class
            await setGlobalQ(-1); 
            renderTeacherPanel();
        }
    };
    
    let sessionHistory = {};
    window.saveHistory = function(idx) {
        if(idx < 0 || !questions[idx]) return;
        const q = questions[idx];
        let stats = "";
        if(q.type === 'multiple-choice') {
            stats = q.options.map(o => {
                const el = document.getElementById(`stat_${idx}_opt_${o.letter}`);
                return o.letter + ": " + (el ? el.innerText : '0');
            }).join(' | ');
        } else {
            const ok = document.getElementById(`stat_${idx}_ok`);
            const nok = document.getElementById(`stat_${idx}_nok`);
            stats = "Rätt: " + (ok ? ok.innerText : '0') + " | Fel: " + (nok ? nok.innerText : '0');
        }
        sessionHistory[idx] = `<div style="background:rgba(255,255,255,0.03); padding:0.8rem; border-radius:8px; border-left:3px solid var(--primary);">
            <strong style="color:#fff;">Fråga ${q.num}:</strong> <span style="color:#9ca3af;">${stats}</span>
        </div>`;
        renderHistory();
    };
    function renderHistory() {
        const el = document.getElementById('teacherHistoryList');
        if(!el) return;
        el.innerHTML = Object.values(sessionHistory).reverse().join('');
    }

    window.pushMessage = async function(color, text) {
        currentMsgColor = color; currentMsgText = text;
        await setGlobalQ(window._lastPushedIndex !== undefined ? window._lastPushedIndex : -1);
    };
    window.pushMessageUI = async function(color, text) {
        await window.pushMessage(color, text);
        const clearBtn = document.getElementById('btnMsgClear');
        const statusTxt = document.getElementById('activeMsgStatus');
        if(color === 'none') {
            clearBtn.style.display = 'none';
            statusTxt.style.display = 'none';
        } else {
            clearBtn.style.display = 'block';
            statusTxt.style.display = 'block';
        }
    };
    window._pushedQuestions = window._pushedQuestions || new Set();
    window.manualPush = async function(idx) {
        if(window._lastPushedIndex !== undefined && window._lastPushedIndex > -1 && window._lastPushedIndex !== idx) {
            saveHistory(window._lastPushedIndex);
        }
        window._pushedQuestions.add(idx);
        currentMsgColor = 'none'; currentMsgText = ''; window._lastPushedIndex = idx;
        const clearBtn = document.getElementById('btnMsgClear');
        if(clearBtn) { clearBtn.style.display = 'none'; document.getElementById('activeMsgStatus').style.display = 'none'; }
        for (let i = 0; i < questions.length; i++) {
            const btn = document.getElementById(`t-btn-${i}`);
            if(!btn) continue;
            if(i === idx) { btn.style.background = 'var(--primary)'; btn.style.color = '#fff'; btn.innerText = '▶️ AKTIV NU'; }
            else if(window._pushedQuestions.has(i)) { btn.style.background = 'rgba(255,255,255,0.05)'; btn.style.borderColor = 'rgba(255,255,255,0.1)'; btn.style.color = '#9ca3af'; btn.innerText = '✓ Redan pushad'; }
            else { btn.style.background = 'rgba(16,185,129,0.2)'; btn.style.borderColor = 'rgba(16,185,129,0.5)'; btn.style.color = '#fff'; btn.innerText = '🚀 Puscha till klassen'; }
        }
        await setGlobalQ(idx);
        
        // Remove auto-polling to save API limits. Fetch once initially.
        pollStats(idx); 
    };
    window.pushQuestion = async function(idx) { await setGlobalQ(idx); };

    window.filterQuestions = function() {
        const query = document.getElementById('teacherSearch').value.toLowerCase();
        const typeFilter = document.getElementById('teacherFilterType').value;
        
        for (let i = 0; i < questions.length; i++) {
            const card = document.getElementById('t-card-' + i);
            if (!card) continue;
            
            const q = questions[i];
            let isMatch = true;
            
            if (typeFilter !== 'all' && q.type !== typeFilter) isMatch = false;
            
            if (query !== '') {
                const searchStr = JSON.stringify(q).toLowerCase(); // Ghetto but effective full-text search on question object
                if (!searchStr.includes(query)) isMatch = false;
            }
            
            card.style.display = isMatch ? 'flex' : 'none';
        }
    };


    renderIntro();
    </script>
</body>
</html>
