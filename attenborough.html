<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: A Life on Our Planet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --bg: #0a0f0a;
            --surface: rgba(30, 41, 59, 0.6);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --correct: #10b981;
            --incorrect: #ef4444;
            --gold: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* === BACKGROUND === */
        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            background: url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=1920&q=80') center/cover no-repeat;
        }
        .bg-layer::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(160deg, rgba(5,10,5,0.92) 0%, rgba(10,20,15,0.82) 100%);
        }

        /* === LAYOUT === */
        .app {
            position: relative; z-index: 1;
            height: 100vh; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; padding: 1.5rem;
        }

        /* === PROGRESS BAR === */
        .progress-bar-wrap {
            position: fixed; top: 0; left: 0; right: 0;
            height: 6px; background: rgba(255,255,255,0.08); z-index: 10;
        }
        .progress-bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--primary), #34d399);
            border-radius: 0 3px 3px 0;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* === STEP INDICATOR === */
        .step-indicator {
            position: fixed; top: 1.5rem; right: 2rem;
            font-size: 1rem; font-weight: 700;
            color: var(--text-muted); z-index: 10;
            letter-spacing: 1px;
        }
        .step-indicator .current { color: var(--primary); font-size: 1.4rem; }

        /* === CARD === */
        .card {
            width: 100%; max-width: 720px;
            background: rgba(10, 15, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: clamp(2rem, 5vw, 3.5rem);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            transform: translateX(0); opacity: 1;
            transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.35s ease;
        }
        .card.exit-left  { transform: translateX(-120px); opacity: 0; }
        .card.enter-right { transform: translateX(120px); opacity: 0; }

        /* === QUESTION === */
        .q-number {
            font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 3px; color: var(--primary);
            font-weight: 800; margin-bottom: 0.75rem;
        }
        .q-text {
            font-size: clamp(1.15rem, 2.5vw, 1.45rem);
            font-weight: 600; line-height: 1.55;
            margin-bottom: 2rem;
        }

        /* === OPTIONS === */
        .options { display: flex; flex-direction: column; gap: 0.85rem; }

        .opt {
            display: flex; align-items: center; gap: 1rem;
            padding: 1.1rem 1.4rem;
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 14px; cursor: pointer;
            font-size: clamp(1rem, 1.8vw, 1.15rem);
            line-height: 1.45;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .opt:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
        .opt.selected { border-color: var(--primary); background: rgba(16,185,129,0.1); }

        .opt .letter {
            flex-shrink: 0; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-weight: 700; font-size: 0.95rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }
        .opt.selected .letter {
            background: var(--primary); color: #fff;
            border-color: var(--primary);
        }

        /* Feedback states */
        .opt.correct-opt {
            border-color: var(--correct) !important;
            background: rgba(16,185,129,0.15) !important;
        }
        .opt.correct-opt .letter {
            background: var(--correct) !important; color: #fff !important;
        }
        .opt.wrong-opt {
            border-color: var(--incorrect) !important;
            background: rgba(239,68,68,0.12) !important;
            opacity: 0.85;
        }
        .opt.wrong-opt .letter {
            background: var(--incorrect) !important; color: #fff !important;
        }
        .opt.dimmed { opacity: 0.4; }

        /* === FEEDBACK === */
        .feedback {
            margin-top: 1.5rem; padding: 1.2rem 1.5rem;
            border-radius: 14px; font-size: 1rem;
            line-height: 1.5; display: none;
            border-left: 4px solid;
            animation: fadeSlideUp 0.4s ease-out;
        }
        .feedback.show { display: block; }
        .feedback.ok  { background: rgba(16,185,129,0.1); border-color: var(--correct); color: #a7f3d0; }
        .feedback.nok { background: rgba(239,68,68,0.1);  border-color: var(--incorrect); color: #fca5a5; }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* === NEXT BUTTON === */
        .next-btn {
            display: none; margin-top: 2rem;
            width: 100%; padding: 1.1rem;
            font-family: inherit; font-size: 1.1rem; font-weight: 700;
            color: #fff; background: var(--primary);
            border: none; border-radius: 14px; cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
            animation: fadeSlideUp 0.4s ease-out;
        }
        .next-btn:hover { background: #059669; transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow); }
        .next-btn.show { display: block; }

        /* === RESULTS SCREEN === */
        .results { text-align: center; }
        .results .emoji { font-size: 4rem; margin-bottom: 1rem; }
        .results h2 {
            font-size: clamp(2rem, 5vw, 3rem); font-weight: 900;
            margin-bottom: 0.5rem;
        }
        .results .score-line {
            font-size: 1.3rem; color: var(--text-muted);
            margin-bottom: 2.5rem;
        }
        .results .score-line strong { color: var(--primary); font-size: 1.6rem; }

        .result-row {
            display: flex; align-items: center; gap: 1rem;
            padding: 0.9rem 1.2rem; border-radius: 12px;
            margin-bottom: 0.6rem; font-size: 1rem;
            text-align: left;
        }
        .result-row.ok  { background: rgba(16,185,129,0.1); }
        .result-row.nok { background: rgba(239,68,68,0.08); }
        .result-icon { font-size: 1.4rem; flex-shrink: 0; }

        .retry-btn {
            margin-top: 2rem; padding: 1rem 3rem;
            font-family: inherit; font-size: 1.1rem; font-weight: 700;
            color: var(--primary); background: transparent;
            border: 2px solid var(--primary); border-radius: 14px;
            cursor: pointer; transition: all 0.25s ease;
        }
        .retry-btn:hover { background: var(--primary); color: #fff; }

        /* === INTRO SCREEN === */
        .intro { text-align: center; }
        .intro .badge {
            display: inline-block; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 3px;
            color: var(--primary); font-weight: 800;
            margin-bottom: 1rem;
        }
        .intro h1 {
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 900; line-height: 1.15;
            margin-bottom: 0.75rem;
        }
        .intro .sub {
            font-size: 1.15rem; color: var(--text-muted);
            margin-bottom: 2.5rem; line-height: 1.5;
        }
        .intro .meta {
            display: flex; justify-content: center; gap: 2rem;
            margin-bottom: 2.5rem; flex-wrap: wrap;
        }
        .intro .meta-item {
            font-size: 0.9rem; color: var(--text-muted);
        }
        .intro .meta-item strong { color: var(--text); }
        .start-btn {
            padding: 1.1rem 4rem;
            font-family: inherit; font-size: 1.2rem; font-weight: 700;
            color: #fff; background: var(--primary);
            border: none; border-radius: 14px; cursor: pointer;
            transition: all 0.25s ease;
        }
        .start-btn:hover { background: #059669; transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow); }
    </style>
</head>
<body>
    <div class="bg-layer"></div>

    <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div class="step-indicator" id="stepIndicator" style="display:none;">
        <span class="current" id="stepCurrent">1</span> / <span id="stepTotal">6</span>
    </div>

    <div class="app">
        <div class="card" id="card">
            <!-- Filled by JS -->
        </div>
    </div>

    <script>

    const APP_KEY = "HakanLessonLabSync2026";
    const BASE_URL = "https://keyvalue.immanuel.co/api/KeyVal";

const questions = [
    { num: 1, text: "Filmen inleds i ruinerna av Tjernobyl. Vad är huvudsyftet med att David Attenborough visar denna plats?", options: [{letter: "A", text: "Att illustrera hur naturen oundvikligen återtar platsen när människan försvinner."}, {letter: "B", text: "Att varna för farorna med att bygga städer för nära instabila kärnkraftverk."}, {letter: "C", text: "Att visa ett tydligt exempel på jordens femte stora massutdöende."}, {letter: "D", text: "Att bevisa att radioaktivitet permanent utplånar allt liv i ekosystemet."}], correct: "A", feedbackOk: "Helt rätt! Tjernobyl visar hur snabbt naturen kan återhämta sig.", feedbackNok: "Rätt svar: <strong>A</strong>. Naturen återvänder och tar över ruinerna." },
    { num: 2, text: "Jordens historia rymmer fem tidigare massutdöenden. Vad har ofta varit en central orsak till dessa katastrofer?", options: [{letter: "A", text: "Kraftiga svängningar i jordens magnetfält under lång tid."}, {letter: "B", text: "Drastiska förändringar av koldioxidhalten i atmosfären."}, {letter: "C", text: "Evolutionen av nya rovdjur som saknat naturliga fiender."}, {letter: "D", text: "En plötslig och global minskning av solens instrålning."}], correct: "B", feedbackOk: "Rätt! Plötsliga koldioxidförändringar, t.ex. från massiv vulkanism, ligger ofta bakom.", feedbackNok: "Rätt svar: <strong>B</strong>." },
    { num: 3, text: "Vad är utmärkande för den tidsperiod som kallas \"Holocen\" (de senaste 10 000 åren)?", options: [{letter: "A", text: "Temperaturen har varit extremt stabil och varierat mindre än 1°C."}, {letter: "B", text: "Jordens kontinenter har suttit ihop i en stor superkontinent."}, {letter: "C", text: "Koldioxidnivåerna har varit historiskt höga och gynnat växter."}, {letter: "D", text: "Det är den enda tidsperioden helt utan klimatförändringar."}], correct: "A", feedbackOk: "Helt rätt! Denna stabilitet kallas av David för vår \"Garden of Eden\".", feedbackNok: "Rätt svar: <strong>A</strong>." },
    { num: 4, text: "Hur hänger vår mänskliga civilisation ihop med Holocens klimat?", options: [{letter: "A", text: "Vi utvecklade teknologi för att skydda oss mot Holocens extrema kyla."}, {letter: "B", text: "Den pålitliga och stabila rytmen av årstider gjorde jordbruket möjligt."}, {letter: "C", text: "Vår förmåga att bygga städer förändrade det globala klimatsystemet."}, {letter: "D", text: "Istiderna tvingade oss att samarbeta för att överleva som art."}], correct: "B", feedbackOk: "Korrekt! Stabilt väder lade grunden för hela den moderna civilisationen.", feedbackNok: "Rätt svar: <strong>B</strong>." },
    { num: 5, text: "Forskarna Grzimek upptäckte något avgörande om Serengetis ekosystem. Vad då?", options: [{letter: "A", text: "Att rovdjuren helt styrde hur många växtätare som kunde överleva."}, {letter: "B", text: "Att ekosystemet var oändligt och inte kunde förstöras av människor."}, {letter: "C", text: "Att grässlätterna var beroende av elefanter för att inte växa igen."}, {letter: "D", text: "Att de stora djurhjordarna krävde enorma ytor för att systemet skulle fungera."}], correct: "D", feedbackOk: "Precis! Naturen behöver stor skala för att migrering och bete ska fungera.", feedbackNok: "Rätt svar: <strong>D</strong>." },
    { num: 6, text: "Bilden av jorden från Apollo-uppdraget (\"Earthrise\") förändrade vår syn på planeten. Hur?", options: [{letter: "A", text: "Den visade att rymden var full av planeter att kolonisera."}, {letter: "B", text: "Den bevisade slutgiltigt att kontinenterna fortfarande rörde sig."}, {letter: "C", text: "Den klargjorde att vår planet är sårbar, isolerad och har en gräns."}, {letter: "D", text: "Den avslöjade hur mycket skog som avverkats i regnskogarna."}], correct: "C", feedbackOk: "Helt rätt. Vi insåg plötsligt att vi lever i ett ändligt och slutet system.", feedbackNok: "Rätt svar: <strong>C</strong>." },
    { num: 7, text: "Om man väger alla däggdjur som lever på jorden idag, hur stor andel utgörs av vilda djur (möss till valar)?", options: [{letter: "A", text: "Endast cirka 4 procent."}, {letter: "B", text: "Ungefär 25 procent."}, {letter: "C", text: "Drygt 50 procent."}, {letter: "D", text: "Nästan 70 procent."}], correct: "A", feedbackOk: "Korrekt. Hisnande 96% utgörs av oss människor och vår boskap.", feedbackNok: "Rätt svar: <strong>A (4%)</strong>." },
    { num: 8, text: "Borneo bestod tidigare till stor del av regnskog. Vad har mångfalden ofta ersatts med?", options: [{letter: "A", text: "Enorma betesmarker för den globala köttindustrin."}, {letter: "B", text: "En konstgjord och artfattig monokultur av oljepalmer."}, {letter: "C", text: "Stora städer och snabbt växande industriområden."}, {letter: "D", text: "Snabbväxande barrskogar för papperstillverkning."}], correct: "B", feedbackOk: "Rätt! Monokultur av palmer ödelägger den biologiska mångfalden.", feedbackNok: "Rätt svar: <strong>B</strong>." },
    { num: 9, text: "Varför spelar orangutangerna en så kritisk nyckelarts-roll i regnskogen?", options: [{letter: "A", text: "De bygger komplexa bon som skyddar marken mot erosion."}, {letter: "B", text: "De håller nere antalet insekter som annars dödar träden."}, {letter: "C", text: "De äter frukter och sprider trädens frön över enorma områden."}, {letter: "D", text: "De varnar andra arter när rovdjur närmar sig."}], correct: "C", feedbackOk: "Rätt! De fungerar som skogens trädgårdsmästare.", feedbackNok: "Rätt svar: <strong>C</strong>." },
    { num: 10, text: "På 1970-talet minskade valfångsten drastiskt. Vad var en starkt bidragande orsak till att vi brydde oss?", options: [{letter: "A", text: "Fartygen blev för dyra att driva under oljekrisen."}, {letter: "B", text: "Mikrofoner spelade in valarnas komplexa och sorgsna sånger."}, {letter: "C", text: "Man upptäckte farliga halter av miljögifter i valköttet."}, {letter: "D", text: "Haven blev så varma att valarna flyttade bort."}], correct: "B", feedbackOk: "Exakt. När vi hörde valarna sjunga gick de från att vara resurser till att bli individer.", feedbackNok: "Rätt svar: <strong>B</strong>." },
    { num: 11, text: "Industrifisket har utplånat 90% av haven stora fiskar. Hur påverkar detta hela havets näringscykel?", options: [{letter: "A", text: "Näringen sjunker, vilket gör att hela näringsväven vid ytan stannar av."}, {letter: "B", text: "Mindre fiskar tar över och havets totala biomassa ökar kraftigt."}, {letter: "C", text: "Plankton förökar sig snabbare, vilket skapar algblomningar."}, {letter: "D", text: "Korallrevet kan obehindrat sprida sig till nya ytor."}], correct: "A", feedbackOk: "Helt rätt. Rovdjuren fungerar som näringspumpar i havet.", feedbackNok: "Rätt svar: <strong>A</strong>." },
    { num: 12, text: "Vad är den direkta biologiska orsaken till att ett korallrev \"bleks\"?", options: [{letter: "A", text: "Vågor bryter av skyddande ytterlager vid kraftigare stormar."}, {letter: "B", text: "Havsvattnet blir för varmt och korallen stöter bort de symbiotiska algerna."}, {letter: "C", text: "Ökad salthalt löser upp korallens yttre och färgstarka kalkskelett."}, {letter: "D", text: "Fiskar som äter alger försvinner, varpå korallen kvävs."}], correct: "B", feedbackOk: "Rätt! Symbiosen dör och bara det vita kalkskelettet blir kvar.", feedbackNok: "Rätt svar: <strong>B</strong>." },
    { num: 13, text: "Att hugga ner regnskog är ett dubbelt problem för klimatet. Vilka två faktorer samverkar negativt?", options: [{letter: "A", text: "Maskinerna drar bränsle och marken blir för hård för att odla på."}, {letter: "B", text: "Koldioxid släpps ut när träden bränns, och vi förlorar växter som absorberar kol."}, {letter: "C", text: "Djur dör ut, och vattnet i marken förångas vilket skapar öken."}, {letter: "D", text: "Det bildas mer moln över de kalhuggna ytorna, vilket värmer jorden."}], correct: "B", feedbackOk: "Korrekt! Vi eldar upp koldioxiden och förstör naturens eget filter samtidigt.", feedbackNok: "Rätt svar: <strong>B</strong>." },
    { num: 14, text: "Isarna vid polerna kyler planeten genom albedo-effekten. Vad innebär detta begrepp?", options: [{letter: "A", text: "Isens stora volym kyler ner de globala havsströmmarna."}, {letter: "B", text: "Isens smältvatten skapar kalla vindar över landmassorna."}, {letter: "C", text: "Isens låga temperatur drar till sig koldioxid från luften."}, {letter: "D", text: "Isens vita yta reflekterar bort solens värmande strålar ut i rymden."}], correct: "D", feedbackOk: "Helt rätt. Albedo fungerar som jordens solskydd.", feedbackNok: "Rätt svar: <strong>D</strong>." },
    { num: 15, text: "Att fortsätta på inslagen väg liknas vid en serie envägs-dörrar. Vad leder dessa trösklar ytterst till?", options: [{letter: "A", text: "Att naturen skapar nya stabila ekosystem utan vår inblandning."}, {letter: "B", text: "Att vi går in i det sjätte massutdöendet och förlorar den värld vår civilisation bygger på."}, {letter: "C", text: "Att mänskligheten tvingas flytta ut i enorma städer på havet."}, {letter: "D", text: "Att jorden långsamt rör sig in i en ny extrem istid."}], correct: "B", feedbackOk: "Rätt. Det handlar om vår egen civilisations undergång.", feedbackNok: "Rätt svar: <strong>B</strong>." }
];

    let currentQ = -1; 
    let highestActivated = -1; // Keep track of the highest question activated by the teacher
    let answers = {};
    let isSyncMode = false;
    let syncInterval = null;

    const card = document.getElementById('card');
    const progressBar = document.getElementById('progressBar');
    const stepIndicator = document.getElementById('stepIndicator');
    const stepCurrent = document.getElementById('stepCurrent');

    const urlParams = new URLSearchParams(window.location.search);
    const isTeacher = urlParams.get('mode') === 'teacher';

    // === API HELPERS ===
    async function setGlobalQ(qIndex) {
        try {
            const stateStr = qIndex + "_" + (teacherPlaying ? "true" : "false");
            await fetch(`${BASE_URL}/UpdateValue/${APP_KEY}/syncState/${stateStr}`, { method: 'POST', mode: 'cors' });
        } catch(e) { console.error(e); }
    }

    async function getGlobalQ() {
        try {
            const res = await fetch(`${BASE_URL}/GetValue/${APP_KEY}/syncState`);
            const text = await res.text();
            if(!text || text.includes('not found')) return { q: -1, p: false };
            
            const raw = text.replace(/"/g, '').trim();
            const parts = raw.split('_');
            if(parts.length === 2) {
                return { q: parseInt(parts[0]), p: parts[1] === 'true' };
            }
            return { q: parseInt(raw) || -1, p: false };
        } catch(e) { return { q: -1, p: false }; }
    }

    async function startSyncMode() {
        isSyncMode = true;
        currentQ = -1;
        highestActivated = -1;
        answers = {};
        
        card.innerHTML = `
            <div class="intro">
                <div class="badge">Live-Synk Aktiv</div>
                <div class="emoji" id="studentIntroEmoji" style="font-size:4rem; margin:1rem 0;">⏳</div>
                <h1>Gör dig redo</h1>
                <p class="sub" id="studentIntroSub">Väntar på att Håkan ska starta filmen...</p>
            </div>
        `;

        // Start polling
        syncInterval = setInterval(async () => {
            const state = await getGlobalQ();
            
            // Handle Play State UI
            const introSub = document.getElementById('studentIntroSub');
            if (introSub && currentQ === -1) {
                if (state.p) {
                    introSub.innerHTML = '🎬 Filmen är igång! Luta dig tillbaka. Frågorna dyker upp här när det är dags.';
                    document.getElementById('studentIntroEmoji').innerHTML = '🍿';
                } else {
                    introSub.innerHTML = 'Väntar på att Håkan ska starta filmen...';
                    document.getElementById('studentIntroEmoji').innerHTML = '⏳';
                }
            }

            if (state.q === 999) {
                showResults();
                return;
            }

            // Keep track of total questions asked
            if (state.q > highestActivated && state.q !== 999) {
                highestActivated = state.q;
            }

            if ((state.q > currentQ && answers[currentQ] !== undefined) || (currentQ === -1 && state.q > -1)) {
                currentQ = state.q;
                showQuestion(currentQ);
            } else if (state.q === -1 && currentQ !== -1) {
                // Reset
                currentQ = -1;
                highestActivated = -1;
                answers = {};
                card.innerHTML = `
                    <div class="intro">
                        <div class="emoji" id="studentIntroEmoji" style="font-size:4rem; margin-bottom:1rem;">⏳</div>
                        <h2>Väntar på Håkan...</h2>
                        <p class="sub" id="studentIntroSub">Quizet har återställts för nästa klass.</p>
                    </div>
                `;
            }
        }, 3000);
    }

    function renderIntro() {
        stepIndicator.style.display = 'none';
        progressBar.style.width = '0%';

        if (isTeacher) {
            renderTeacherPanel();
            return;
        }

        card.innerHTML = `
            <div class="intro">
                <div class="badge">Ekologi & Klimat</div>
                <h1>A Life on Our Planet</h1>
                <p class="sub">Frågor om filmens första del och det vi diskuterat om koraller, ekosystem och klimat.</p>
                <div class="meta" style="flex-direction: column; align-items: center; gap: 1rem;">
                    <button class="start-btn" onclick="startSyncMode()">🔗 Gå med i Lärar-Synk (Live)</button>
                    <button class="retry-btn" style="margin-top:0;" onclick="startSoloMode()">Öva i egen takt</button>
                </div>
            </div>
        `;
    }

    function startSoloMode() {
        isSyncMode = false;
        currentQ = 0;
        highestActivated = questions.length - 1; // All questions possible in solo mode
        answers = {};
        showQuestion(0);
    }

    function showQuestion(idx) {
        stepIndicator.style.display = 'block';
        stepCurrent.textContent = idx + 1;
        progressBar.style.width = ((idx) / questions.length * 100) + '%';

        const q = questions[idx];
        card.classList.add('exit-left');

        setTimeout(() => {
            card.classList.remove('exit-left');
            card.classList.add('enter-right');

            card.innerHTML = `
                <div class="q-number">Fråga ${q.num} av ${questions.length}</div>
                <div class="q-text">${q.text}</div>
                <div class="options" id="opts">
                    ${q.options.map(o => `
                        <div class="opt" data-val="${o.letter}" onclick="selectOption(this, '${o.letter}')">
                            <span class="letter">${o.letter}</span>
                            <span>${o.text}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="feedback" id="fb"></div>
                ${!isSyncMode ? `
                    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
                        ${idx < questions.length - 1 ? 'Nästa Fråga →' : 'Visa Resultat →'}
                    </button>
                ` : `
                    <div id="syncWaitMsg" style="display:none; text-align:center; margin-top:2rem; color:var(--text-muted); font-weight:600;">
                        Svar registrerat! ⏳ Väntar på att filmen ska fortsätta...
                    </div>
                `}
            `;

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    card.classList.remove('enter-right');
                });
            });
        }, 350);
    }

    function selectOption(el, val) {
        if (answers[currentQ] !== undefined) return;

        answers[currentQ] = val;
        const q = questions[currentQ];
        const isCorrect = val === q.correct;

        document.querySelectorAll('.opt').forEach(o => {
            const v = o.dataset.val;
            o.style.cursor = 'default';
            if (v === q.correct) {
                o.classList.add('correct-opt');
            } else if (v === val && !isCorrect) {
                o.classList.add('wrong-opt');
            } else {
                o.classList.add('dimmed');
            }
        });

        const fb = document.getElementById('fb');
        fb.className = 'feedback show ' + (isCorrect ? 'ok' : 'nok');
        fb.innerHTML = isCorrect ? '✓ ' + q.feedbackOk : '✗ ' + q.feedbackNok;

        if (!isSyncMode) {
            document.getElementById('nextBtn').classList.add('show');
        } else {
            document.getElementById('syncWaitMsg').style.display = 'block';
        }
    }

    function nextQuestion() {
        if (currentQ < questions.length - 1) {
            currentQ++;
            showQuestion(currentQ);
        } else {
            showResults();
        }
    }

    function showResults() {
        if(syncInterval) clearInterval(syncInterval);
        progressBar.style.width = '100%';
        stepIndicator.style.display = 'none';

        // Result calculation based ONLY on questions the teacher actually activated
        let totalPossible = Math.max(0, highestActivated + 1);
        
        if (totalPossible === 0) {
            card.innerHTML = '<div class="results"><h2>Inga frågor besvarades.</h2></div>';
            return;
        }

        let score = 0;
        let resultRows = '';
        
        // Only evaluate up to highestActivated
        for(let i=0; i < totalPossible; i++) {
            const q = questions[i];
            const ans = answers[i];
            const ok = ans === q.correct;
            if (ok) score++;
            
            resultRows += `<div class="result-row ${ok ? 'ok' : 'nok'}">
                <span class="result-icon">${ok ? '✓' : '✗'}</span>
                <span style="font-size:0.95rem;">Fråga ${q.num}: ${ok ? 'Rätt!' : (ans ? 'Fel — rätt svar: ' + q.correct : 'Ej besvarad — rätt svar: ' + q.correct)}</span>
            </div>`;
        }

        let emoji, title;
        const percentage = score / totalPossible;
        if (percentage === 1)               { emoji = '🌟'; title = 'Full pott! Strålande!'; }
        else if (percentage >= 0.6)         { emoji = '💚'; title = 'Bra jobbat!'; }
        else if (percentage >= 0.3)         { emoji = '🌱'; title = 'En bra start!'; }
        else                                { emoji = '📖'; title = 'Dags att repetera!'; }

        card.classList.add('exit-left');
        setTimeout(() => {
            card.classList.remove('exit-left');
            card.classList.add('enter-right');

            card.innerHTML = `
                <div class="results">
                    <div class="emoji">${emoji}</div>
                    <h2>${title}</h2>
                    <p class="score-line">Du fick <strong>${score}</strong> av ${totalPossible} besvarade frågor rätt</p>
                    <div style="max-height:300px; overflow-y:auto; padding-right:0.5rem;">
                        ${resultRows}
                    </div>
                    ${!isSyncMode ? `<button class="retry-btn" onclick="retry()">Försök igen</button>` : ''}
                </div>
            `;

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    card.classList.remove('enter-right');
                });
            });
        }, 350);
    }

    function retry() {
        currentQ = -1;
        highestActivated = -1;
        answers = {};
        renderIntro();
    }

    // === TEACHER PANEL ===
    let teacherTime = 0; 
    let teacherPlaying = false;
    let teacherTimer = null;
    let teacherMode = 'manual'; // 'auto' or 'manual'

    const qTimestamps = [
        3 * 60, 6 * 60, 9 * 60, 12 * 60, 15 * 60, 
        18 * 60, 21 * 60, 24 * 60, 27 * 60, 30 * 60, 
        33 * 60, 36 * 60, 39 * 60, 42 * 60, 45 * 60
    ];

    async function renderTeacherPanel() {
        stepIndicator.style.display = 'none';
        progressBar.style.display = 'none';
        
        await setGlobalQ(-1); 
        window._lastPushedIndex = -1;

        card.innerHTML = `
            <div class="intro" style="text-align:left;">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1rem;">
                    <div>
                        <div class="badge">Lärarpanel</div>
                        <h1 style="color:var(--primary); text-align:left; font-size:2rem; margin-top:0.5rem;">Lektionskontroll</h1>
                    </div>
                    <button onclick="resetLesson()" style="background:rgba(239,68,68,0.2); color:#fca5a5; border:1px solid rgba(239,68,68,0.4); padding:0.5rem 1rem; border-radius:8px; cursor:pointer; font-weight:bold;">🔄 Nollställ (Ny Klass)</button>
                </div>

                <div style="display:flex; gap:1rem; margin-bottom:1.5rem;">
                    <button id="modeManualBtn" onclick="setMode('manual')" style="flex:1; padding:0.8rem; border-radius:10px; font-weight:bold; cursor:pointer; background:var(--primary); color:#fff; border:none;">👆 Manuell Aktivering</button>
                    <button id="modeAutoBtn" onclick="setMode('auto')" style="flex:1; padding:0.8rem; border-radius:10px; font-weight:bold; cursor:pointer; background:rgba(255,255,255,0.1); color:var(--text-muted); border:1px solid rgba(255,255,255,0.1);">⏱ Tidslinje (Auto)</button>
                </div>

                <!-- Auto-Synk Panel (Visible in auto mode) -->
                <div id="autoSyncContainer" style="display:none; background:rgba(255,255,255,0.05); padding:1.5rem; border-radius:14px; margin-bottom:1.5rem;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                        <div style="font-size:2.5rem; font-weight:900; font-variant-numeric: tabular-nums;" id="timeDisplay">00:00</div>
                        <div>
                            <button id="playBtn" onclick="togglePlay()" style="background:var(--primary); color:#fff; border:none; padding:0.8rem 1.5rem; border-radius:8px; font-weight:bold; cursor:pointer; font-size:1.1rem;">▶️ Play</button>
                        </div>
                    </div>
                    <div style="display:flex; gap:1rem; align-items:center;">
                        <input type="range" id="timeSlider" min="0" max="2700" value="0" style="flex-grow:1; cursor:pointer;" oninput="sliderMove(this.value)">
                        <button onclick="adjustTime(-30)" style="background:rgba(255,255,255,0.1); border:none; color:#fff; padding:0.5rem; border-radius:6px; cursor:pointer;">-30s</button>
                        <button onclick="adjustTime(30)" style="background:rgba(255,255,255,0.1); border:none; color:#fff; padding:0.5rem; border-radius:6px; cursor:pointer;">+30s</button>
                    </div>
                    <p style="color:var(--text-muted); font-size:0.85rem; margin-top:1rem;">Frågorna puslas automatiskt vid förinställda tider i filmen.</p>
                </div>

                <!-- Manual Panel / Question List -->
                <h3 style="margin-bottom:1rem; color:var(--text-muted); font-size:0.9rem; text-transform:uppercase; letter-spacing:2px;">Frågebank</h3>
                <div id="teacherOpts" style="max-height: 400px; overflow-y: auto; padding-right:1rem; display:flex; flex-direction:column; gap:1rem;">
                    ${questions.map((q, i) => `
                        <div class="opt" id="t-opt-${i}" style="flex-direction:column; align-items:stretch; background:rgba(255,255,255,0.02); border-color:rgba(255,255,255,0.05); padding:1rem; opacity:1;">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                                <span style="font-weight:bold; color:var(--primary);">Fråga ${q.num}</span>
                                <span style="font-size:0.85rem; color:var(--text-muted);">Auto: ${formatTime(qTimestamps[i])}</span>
                            </div>
                            <div style="font-size:1rem; font-weight:600; margin-bottom:0.8rem;">${q.text}</div>
                            <div style="font-size:0.9rem; color:var(--text-muted); margin-bottom:1rem;">
                                ${q.options.map(o => `<div style="margin-bottom:0.3rem;"><strong>${o.letter}:</strong> ${o.text}</div>`).join('')}
                            </div>
                            <button id="t-btn-${i}" onclick="manualPush(${i})" style="background:rgba(16,185,129,0.2); border:1px solid rgba(16,185,129,0.5); color:#fff; padding:0.6rem; border-radius:8px; font-weight:bold; cursor:pointer; width:100%;">🚀 Puscha till elever</button>
                        </div>
                    `).join('')}
                </div>
                <div class="opt" onclick="pushQuestion(999)" style="margin-top:1.5rem; border-color:var(--incorrect); justify-content:center;">
                    <span>🏁 Avsluta Lektion (Rätta alla aktiverade frågor)</span>
                </div>
            </div>
        `;
        
        updateTimeDisplay();
    }

    window.setMode = function(mode) {
        teacherMode = mode;
        const manBtn = document.getElementById('modeManualBtn');
        const autoBtn = document.getElementById('modeAutoBtn');
        const autoSync = document.getElementById('autoSyncContainer');

        if (mode === 'manual') {
            manBtn.style.background = 'var(--primary)'; manBtn.style.color = '#fff'; manBtn.style.border = 'none';
            autoBtn.style.background = 'rgba(255,255,255,0.1)'; autoBtn.style.color = 'var(--text-muted)'; autoBtn.style.border = '1px solid rgba(255,255,255,0.1)';
            autoSync.style.display = 'none';
        } else {
            autoBtn.style.background = 'var(--primary)'; autoBtn.style.color = '#fff'; autoBtn.style.border = 'none';
            manBtn.style.background = 'rgba(255,255,255,0.1)'; manBtn.style.color = 'var(--text-muted)'; manBtn.style.border = '1px solid rgba(255,255,255,0.1)';
            autoSync.style.display = 'block';
        }
    };

    window.resetLesson = async function() {
        if(confirm("Är du säker? Detta nollställer elevernas quiz och din panel.")) {
            teacherTime = 0;
            if(teacherTimer) clearInterval(teacherTimer);
            teacherPlaying = false;
            window._lastPushedIndex = -1;
            await setGlobalQ(-1);
            renderTeacherPanel();
        }
    };

    window.manualPush = async function(idx) {
        // UI updates for manual mode button
        for (let i = 0; i < questions.length; i++) {
            const btn = document.getElementById(`t-btn-${i}`);
            if(!btn) continue;
            if(i <= idx) {
                btn.innerHTML = '✅ Pushad';
                btn.style.background = 'rgba(255,255,255,0.1)';
                btn.style.borderColor = 'rgba(255,255,255,0.1)';
                btn.style.color = 'var(--text-muted)';
            } else {
                btn.innerHTML = '🚀 Puscha till elever';
                btn.style.background = 'rgba(16,185,129,0.2)';
                btn.style.borderColor = 'rgba(16,185,129,0.5)';
                btn.style.color = '#fff';
            }
        }
        window._lastPushedIndex = idx;
        await setGlobalQ(idx);
    };

    function formatTime(sec) {
        const m = Math.floor(sec / 60).toString().padStart(2, '0');
        const s = (sec % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function updateTimeDisplay() {
        const display = document.getElementById('timeDisplay');
        if(!display) return;
        
        display.textContent = formatTime(teacherTime);
        document.getElementById('timeSlider').value = teacherTime;

        if (teacherMode === 'auto') {
            let activeIndex = -1;
            for (let i = 0; i < qTimestamps.length; i++) {
                if (teacherTime >= qTimestamps[i]) activeIndex = i;
            }

            if (window._lastPushedIndex !== activeIndex) {
                manualPush(activeIndex); // Reuse UI update logic
                window._lastPushedIndex = activeIndex;
            }
        }
    }

    window.togglePlay = function() {
        teacherPlaying = !teacherPlaying;
        const btn = document.getElementById('playBtn');
        if (teacherPlaying) {
            btn.innerHTML = '⏸️ Paus';
            btn.style.background = 'rgba(255,255,255,0.2)';
            teacherTimer = setInterval(() => {
                teacherTime++;
                updateTimeDisplay();
            }, 1000);
        } else {
            btn.innerHTML = '▶️ Play';
            btn.style.background = 'var(--primary)';
            clearInterval(teacherTimer);
        }
        setGlobalQ(window._lastPushedIndex || -1);
    };

    window.sliderMove = function(val) {
        teacherTime = parseInt(val);
        updateTimeDisplay();
    };

    window.adjustTime = function(delta) {
        teacherTime = Math.max(0, teacherTime + delta);
        updateTimeDisplay();
    };

    window.pushQuestion = async function(idx) {
        await setGlobalQ(idx);
    };

    document.addEventListener('keydown', e => {
        if (currentQ < 0 || isSyncMode || isTeacher) return;
        const map = { 'a': 'A', 'b': 'B', 'c': 'C', 'd': 'D', '1': 'A', '2': 'B', '3': 'C', '4': 'D' };
        const val = map[e.key.toLowerCase()];
        if (val && answers[currentQ] === undefined) {
            const opt = document.querySelector(`.opt[data-val="${val}"]`);
            if (opt) selectOption(opt, val);
        }
        if ((e.key === 'Enter' || e.key === ' ') && answers[currentQ] !== undefined) {
            e.preventDefault();
            nextQuestion();
        }
    });
    
    // START APP
    renderIntro();

</script>
</body>
</html>
