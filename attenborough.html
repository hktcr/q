<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlassPuls: A Life on Our Planet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --bg: #0a0f0a;
            --surface: rgba(30, 41, 59, 0.6);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --correct: #10b981;
            --incorrect: #ef4444;
            --gold: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* === BACKGROUND === */
        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            background: url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=1920&q=80') center/cover no-repeat;
        }
        .bg-layer::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(160deg, rgba(5,10,5,0.92) 0%, rgba(10,20,15,0.82) 100%);
        }

        /* === LAYOUT === */
        .app {
            position: relative; z-index: 1;
            height: 100vh; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; padding: 1.5rem;
        }

        /* === PROGRESS BAR === */
        .progress-bar-wrap {
            position: fixed; top: 0; left: 0; right: 0;
            height: 6px; background: rgba(255,255,255,0.08); z-index: 10;
        }
        .progress-bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--primary), #34d399);
            border-radius: 0 3px 3px 0;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* === STEP INDICATOR === */
        .step-indicator {
            position: fixed; top: 1.5rem; right: 2rem;
            font-size: 1rem; font-weight: 700;
            color: var(--text-muted); z-index: 10;
            letter-spacing: 1px;
        }
        .step-indicator .current { color: var(--primary); font-size: 1.4rem; }

        /* === CARD === */
        .card {
            width: 100%; max-width: 720px;
            background: rgba(10, 15, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: clamp(2rem, 5vw, 3.5rem);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            transform: translateX(0); opacity: 1;
            transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.35s ease;
        }
        .card.exit-left  { transform: translateX(-120px); opacity: 0; }
        .card.enter-right { transform: translateX(120px); opacity: 0; }

        /* === QUESTION === */
        .q-number {
            font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 3px; color: var(--primary);
            font-weight: 800; margin-bottom: 0.75rem;
        }
        .q-text {
            font-size: clamp(1.15rem, 2.5vw, 1.45rem);
            font-weight: 600; line-height: 1.55;
            margin-bottom: 2rem;
        }

        /* === OPTIONS === */
        .options { display: flex; flex-direction: column; gap: 0.85rem; }

        .opt {
            display: flex; align-items: center; gap: 1rem;
            padding: 1.1rem 1.4rem;
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 14px; cursor: pointer;
            font-size: clamp(1rem, 1.8vw, 1.15rem);
            line-height: 1.45;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .opt:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
        .opt.selected { border-color: var(--primary); background: rgba(16,185,129,0.1); }

        .opt .letter {
            flex-shrink: 0; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-weight: 700; font-size: 0.95rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }
        .opt.selected .letter {
            background: var(--primary); color: #fff;
            border-color: var(--primary);
        }

        /* Feedback states */
        .opt.correct-opt {
            border-color: var(--correct) !important;
            background: rgba(16,185,129,0.15) !important;
        }
        .opt.correct-opt .letter {
            background: var(--correct) !important; color: #fff !important;
        }
        .opt.wrong-opt {
            border-color: var(--incorrect) !important;
            background: rgba(239,68,68,0.12) !important;
            opacity: 0.85;
        }
        .opt.wrong-opt .letter {
            background: var(--incorrect) !important; color: #fff !important;
        }
        .opt.dimmed { opacity: 0.4; }

        /* === FEEDBACK === */
        .feedback {
            margin-top: 1.5rem; padding: 1.2rem 1.5rem;
            border-radius: 14px; font-size: 1rem;
            line-height: 1.5; display: none;
            border-left: 4px solid;
            animation: fadeSlideUp 0.4s ease-out;
        }
        .feedback.show { display: block; }
        .feedback.ok  { background: rgba(16,185,129,0.1); border-color: var(--correct); color: #a7f3d0; }
        .feedback.nok { background: rgba(239,68,68,0.1);  border-color: var(--incorrect); color: #fca5a5; }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* === NEXT BUTTON === */
        .next-btn {
            display: none; margin-top: 2rem;
            width: 100%; padding: 1.1rem;
            font-family: inherit; font-size: 1.1rem; font-weight: 700;
            color: #fff; background: var(--primary);
            border: none; border-radius: 14px; cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
            animation: fadeSlideUp 0.4s ease-out;
        }
        .next-btn:hover { background: #059669; transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow); }
        .next-btn.show { display: block; }

        /* === RESULTS SCREEN === */
        .results { text-align: center; }
        .results .emoji { font-size: 4rem; margin-bottom: 1rem; }
        .results h2 {
            font-size: clamp(2rem, 5vw, 3rem); font-weight: 900;
            margin-bottom: 0.5rem;
        }
        .results .score-line {
            font-size: 1.3rem; color: var(--text-muted);
            margin-bottom: 2.5rem;
        }
        .results .score-line strong { color: var(--primary); font-size: 1.6rem; }

        .result-row {
            display: flex; align-items: center; gap: 1rem;
            padding: 0.9rem 1.2rem; border-radius: 12px;
            margin-bottom: 0.6rem; font-size: 1rem;
            text-align: left;
        }
        .result-row.ok  { background: rgba(16,185,129,0.1); }
        .result-row.nok { background: rgba(239,68,68,0.08); }
        .result-icon { font-size: 1.4rem; flex-shrink: 0; }

        .retry-btn {
            margin-top: 2rem; padding: 1rem 3rem;
            font-family: inherit; font-size: 1.1rem; font-weight: 700;
            color: var(--primary); background: transparent;
            border: 2px solid var(--primary); border-radius: 14px;
            cursor: pointer; transition: all 0.25s ease;
        }
        .retry-btn:hover { background: var(--primary); color: #fff; }

        /* === INTRO SCREEN === */
        .intro { text-align: center; }
        .intro .badge {
            display: inline-block; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 3px;
            color: var(--primary); font-weight: 800;
            margin-bottom: 1rem;
        }
        .intro h1 {
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 900; line-height: 1.15;
            margin-bottom: 0.75rem;
        }
        .intro .sub {
            font-size: 1.15rem; color: var(--text-muted);
            margin-bottom: 2.5rem; line-height: 1.5;
        }
        .intro .meta {
            display: flex; justify-content: center; gap: 2rem;
            margin-bottom: 2.5rem; flex-wrap: wrap;
        }
        .intro .meta-item {
            font-size: 0.9rem; color: var(--text-muted);
        }
        .intro .meta-item strong { color: var(--text); }
        .start-btn {
            padding: 1.1rem 4rem;
            font-family: inherit; font-size: 1.2rem; font-weight: 700;
            color: #fff; background: var(--primary);
            border: none; border-radius: 14px; cursor: pointer;
            transition: all 0.25s ease;
        }
        .start-btn:hover { background: #059669; transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow); }
    </style>
</head>

const questions = [
    { num: 1, text: "När David var pojke letade han ofta efter fossil. Vad är ett fossil egentligen?", options: [{letter: "A", text: "En sällsynt metall som bildas djupt nere i vulkaner."}, {letter: "B", text: "Förstenade rester eller spår av urgamla växter och djur."}, {letter: "C", text: "En typ av meteorit som slog ner för miljoner år sedan."}, {letter: "D", text: "Ett verktyg som tidiga stenåldersmänniskor tillverkade."}], correct: "B", feedbackOk: "Helt rätt! Fossil ger oss en bild av livet som fanns långt före oss.", feedbackNok: "Rätt svar: <strong>B</strong>. Fossil är bevarade rester eller spår från forntida liv." },
    { num: 2, text: "Livets historia präglas mestadels av långsam utveckling, men fem gånger har det skett 'massutdöenden'. Vad innebär detta?", options: [{letter: "A", text: "Enorma sjukdomsutbrott som bara drabbade däggdjuren."}, {letter: "B", text: "Att en enda rovdjursart åt upp alla andra djur på land."}, {letter: "C", text: "Katastrofer där en extremt stor del av jordens arter dör ut snabbt."}, {letter: "D", text: "Att planetens kontinentalplattor helt stannar av och slutar röra sig."}], correct: "C", feedbackOk: "Rätt. Det senaste massutdöendet tog bland annat död på dinosaurierna.", feedbackNok: "Rätt svar: <strong>C</strong>. Ett massutdöende är en katastrofal förlust av arter över hela jorden." },
    { num: 3, text: "Vi lever i en tidsperiod som kallas Holocen. Vad har varit så speciellt med Holocens klimat?", options: [{letter: "A", text: "Temperaturen har varit extremt stabil under 10 000 år."}, {letter: "B", text: "Jorden har blivit långsamt och stadigt mycket kallare."}, {letter: "C", text: "Klimatet har varierat kraftigt mellan extrema istider och värmeböljor."}, {letter: "D", text: "Atmosfären har helt saknat naturlig koldioxid."}], correct: "A", feedbackOk: "Helt rätt! Temperaturen har inte varierat med mer än ungefär en grad Celsius.", feedbackNok: "Rätt svar: <strong>A</strong>. Holocen har varit otroligt stabilt jämfört med tidigare epoker." },

];

    let currentQ = -1; 
    let highestActivated = -1; // Keep track of the highest question activated by the teacher
    let answers = {};
    let isSyncMode = false;
    let syncInterval = null;

    let currentMsgColor = 'none';
    let currentMsgText = '';

    const card = document.getElementById('card');
    const progressBar = document.getElementById('progressBar');
    const stepIndicator = document.getElementById('stepIndicator');
    const stepCurrent = document.getElementById('stepCurrent');

    const urlParams = new URLSearchParams(window.location.search);
    const isTeacher = urlParams.get('mode') === 'teacher';

    // Inject message overlay
    const msgOverlay = document.createElement('div');
    msgOverlay.id = 'fullScreenMsg';
    msgOverlay.style.cssText = 'display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:99999; justify-content:center; align-items:center; flex-direction:column; padding:2rem; text-align:center; transition: background 0.3s ease;';
    msgOverlay.innerHTML = '<h1 id="fullScreenMsgText" style="font-size:max(8vw, 3rem); font-weight:900; color:white; text-transform:uppercase; text-shadow: 0 4px 20px rgba(0,0,0,0.5); line-height:1.1; margin:0;"></h1>';
    document.body.appendChild(msgOverlay);

    // === HEX ENCODING FOR SAFE API TRANSFER ===
    function strToHex(str) {
        return Array.from(new TextEncoder().encode(str)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    function hexToStr(hex) {
        const bytes = new Uint8Array(Math.ceil(hex.length / 2));
        for (let i = 0; i < bytes.length; i++) bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
        return new TextDecoder().decode(bytes);
    }

    // === API HELPERS ===
    async function setGlobalQ(qIndex) {
        try {
            const msgHex = currentMsgColor === 'none' ? 'none' : strToHex(currentMsgText);
            const stateStr = qIndex + "_" + (teacherPlaying ? "true" : "false") + "_" + currentMsgColor + "_" + msgHex;
            await fetch(`${BASE_URL}/UpdateValue/${APP_KEY}/syncState/${stateStr}`, { method: 'POST', mode: 'cors' });
        } catch(e) { console.error(e); }
    }

    async function getGlobalQ() {
        try {
            const res = await fetch(`${BASE_URL}/GetValue/${APP_KEY}/syncState`);
            const text = await res.text();
            if(!text || text.includes('not found')) return { q: -1, p: false, msgColor: 'none', msgText: '' };
            
            const raw = text.replace(/"/g, '').trim();
            const parts = raw.split('_');
            
            let result = { q: parseInt(parts[0]) || -1, p: parts[1] === 'true', msgColor: 'none', msgText: '' };
            if(parts.length >= 4) {
                result.msgColor = parts[2];
                if(parts[3] !== 'none') result.msgText = hexToStr(parts[3]);
            }
            return result;
        } catch(e) { return { q: -1, p: false, msgColor: 'none', msgText: '' }; }
    }

    async function startSyncMode() {
        isSyncMode = true;
        currentQ = -1;
        highestActivated = -1;
        answers = {};
        
        card.innerHTML = `
            <div class="intro">
                <div class="badge">Live-Synk Aktiv</div>
                <div class="emoji" id="studentIntroEmoji" style="font-size:4rem; margin:1rem 0;">⏳</div>
                <h1>Gör dig redo</h1>
                <p class="sub" id="studentIntroSub">Väntar på att Håkan ska starta filmen...</p>
            </div>
        `;

        // Start polling
        syncInterval = setInterval(async () => {
            const state = await getGlobalQ();
            
            // 1. Handle Messages
            if (state.msgColor && state.msgColor !== 'none') {
                msgOverlay.style.display = 'flex';
                document.getElementById('fullScreenMsgText').textContent = state.msgText;
                if (state.msgColor === 'red') msgOverlay.style.background = '#ef4444';
                else if (state.msgColor === 'blue') msgOverlay.style.background = '#3b82f6';
                else msgOverlay.style.background = '#1f2937';
            } else {
                msgOverlay.style.display = 'none';
            }

            // 2. Handle Play State UI
            const introSub = document.getElementById('studentIntroSub');
            if (introSub && currentQ === -1 && state.msgColor === 'none') {
                if (state.p) {
                    introSub.innerHTML = '🎬 Filmen är igång! Luta dig tillbaka. Frågorna dyker upp här när det är dags.';
                    document.getElementById('studentIntroEmoji').innerHTML = '🍿';
                } else {
                    introSub.innerHTML = 'Väntar på att Håkan ska starta filmen...';
                    document.getElementById('studentIntroEmoji').innerHTML = '⏳';
                }
            }

            if (state.q === 999) {
                showResults();
                return;
            }

            // Keep track of total questions asked
            if (state.q > highestActivated && state.q !== 999) {
                highestActivated = state.q;
            }

            if ((state.q > currentQ && answers[currentQ] !== undefined) || (currentQ === -1 && state.q > -1)) {
                currentQ = state.q;
                showQuestion(currentQ);
            } else if (state.q === -1 && currentQ !== -1) {
                // Reset
                currentQ = -1;
                highestActivated = -1;
                answers = {};
                card.innerHTML = `
                    <div class="intro">
                        <div class="emoji" id="studentIntroEmoji" style="font-size:4rem; margin-bottom:1rem;">⏳</div>
                        <h2>Väntar på Håkan...</h2>
                        <p class="sub" id="studentIntroSub">KlassPuls har återställts för nästa klass.</p>
                    </div>
                `;
            }
        }, 3000);
    }

    function renderIntro() {
        stepIndicator.style.display = 'none';
        progressBar.style.width = '0%';

        if (isTeacher) {
            renderTeacherPanel();
            return;
        }

        card.innerHTML = `
            <div class="intro">
                <div class="badge">Ekologi & Klimat</div>
                <h1>KlassPuls: A Life on Our Planet</h1>
                <p class="sub">Frågor om filmens första del och det vi diskuterat om koraller, ekosystem och klimat.</p>
                <div class="meta" style="flex-direction: column; align-items: center; gap: 1rem;">
                    <button class="start-btn" onclick="startSyncMode()">🔗 Gå med i Lärar-Synk (Live)</button>
                    <button class="retry-btn" style="margin-top:0;" onclick="startSoloMode()">Öva i egen takt</button>
                </div>
            </div>
        `;
    }

    function startSoloMode() {
        isSyncMode = false;
        currentQ = 0;
        highestActivated = questions.length - 1; // All questions possible in solo mode
        answers = {};
        showQuestion(0);
    }

    function showQuestion(idx) {
        stepIndicator.style.display = 'block';
        stepCurrent.textContent = idx + 1;
        progressBar.style.width = ((idx) / questions.length * 100) + '%';

        const q = questions[idx];
        card.classList.add('exit-left');

        setTimeout(() => {
            card.classList.remove('exit-left');
            card.classList.add('enter-right');

            card.innerHTML = `
                <div class="q-number">Fråga ${q.num} av ${questions.length}</div>
                <div class="q-text">${q.text}</div>
                <div class="options" id="opts">
                    ${q.options.map(o => `
                        <div class="opt" data-val="${o.letter}" onclick="selectOption(this, '${o.letter}')">
                            <span class="letter">${o.letter}</span>
                            <span>${o.text}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="feedback" id="fb"></div>
                ${!isSyncMode ? `
                    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
                        ${idx < questions.length - 1 ? 'Nästa Fråga →' : 'Visa Resultat →'}
                    </button>
                ` : `
                    <div id="syncWaitMsg" style="display:none; text-align:center; margin-top:2rem; color:var(--text-muted); font-weight:600;">
                        Svar registrerat! ⏳ Väntar på att filmen ska fortsätta...
                    </div>
                `}
            `;

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    card.classList.remove('enter-right');
                });
            });
        }, 350);
    }

    function selectOption(el, val) {
        if (answers[currentQ] !== undefined) return;

        answers[currentQ] = val;
        const q = questions[currentQ];
        const isCorrect = val === q.correct;

        document.querySelectorAll('.opt').forEach(o => {
            const v = o.dataset.val;
            o.style.cursor = 'default';
            if (v === q.correct) {
                o.classList.add('correct-opt');
            } else if (v === val && !isCorrect) {
                o.classList.add('wrong-opt');
            } else {
                o.classList.add('dimmed');
            }
        });

        const fb = document.getElementById('fb');
        fb.className = 'feedback show ' + (isCorrect ? 'ok' : 'nok');
        fb.innerHTML = isCorrect ? '✓ ' + q.feedbackOk : '✗ ' + q.feedbackNok;

        if (!isSyncMode) {
            document.getElementById('nextBtn').classList.add('show');
        } else {
            document.getElementById('syncWaitMsg').style.display = 'block';
        }
    }

    function nextQuestion() {
        if (currentQ < questions.length - 1) {
            currentQ++;
            showQuestion(currentQ);
        } else {
            showResults();
        }
    }

    function showResults() {
        if(syncInterval) clearInterval(syncInterval);
        progressBar.style.width = '100%';
        stepIndicator.style.display = 'none';
        msgOverlay.style.display = 'none'; // Ensure no messages block results

        // Result calculation based ONLY on questions the teacher actually activated
        let totalPossible = Math.max(0, highestActivated + 1);
        
        if (totalPossible === 0) {
            card.innerHTML = '<div class="results"><h2>Inga frågor besvarades.</h2></div>';
            return;
        }

        let score = 0;
        let resultRows = '';
        
        // Only evaluate up to highestActivated
        for(let i=0; i < totalPossible; i++) {
            const q = questions[i];
            const ans = answers[i];
            const ok = ans === q.correct;
            if (ok) score++;
            
            resultRows += `<div class="result-row ${ok ? 'ok' : 'nok'}">
                <span class="result-icon">${ok ? '✓' : '✗'}</span>
                <span style="font-size:0.95rem;">Fråga ${q.num}: ${ok ? 'Rätt!' : (ans ? 'Fel — rätt svar: ' + q.correct : 'Ej besvarad — rätt svar: ' + q.correct)}</span>
            </div>`;
        }

        let emoji, title;
        const percentage = score / totalPossible;
        if (percentage === 1)               { emoji = '🌟'; title = 'Full pott! Strålande!'; }
        else if (percentage >= 0.6)         { emoji = '💚'; title = 'Bra jobbat!'; }
        else if (percentage >= 0.3)         { emoji = '🌱'; title = 'En bra start!'; }
        else                                { emoji = '📖'; title = 'Dags att repetera!'; }

        card.classList.add('exit-left');
        setTimeout(() => {
            card.classList.remove('exit-left');
            card.classList.add('enter-right');

            card.innerHTML = `
                <div class="results">
                    <div class="emoji">${emoji}</div>
                    <h2>${title}</h2>
                    <p class="score-line">Du fick <strong>${score}</strong> av ${totalPossible} besvarade frågor rätt</p>
                    <div style="max-height:300px; overflow-y:auto; padding-right:0.5rem;">
                        ${resultRows}
                    </div>
                    ${!isSyncMode ? `<button class="retry-btn" onclick="retry()">Försök igen</button>` : ''}
                </div>
            `;

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    card.classList.remove('enter-right');
                });
            });
        }, 350);
    }

    function retry() {
        currentQ = -1;
        highestActivated = -1;
        answers = {};
        renderIntro();
    }

                    `).join('')}
                </div>
                <div class="opt" onclick="pushQuestion(999)" style="margin-top:1.5rem; border-color:var(--incorrect); justify-content:center; padding:1.2rem;">
                    <span style="font-size:1.1rem; font-weight:bold;">🏁 Avsluta Lektion (Rätta alla aktiverade frågor)</span>
                </div>
            </div>
        `;
        
        updateTimeDisplay();
    }

    window.setMode = function(mode) {
        teacherMode = mode;
        const manBtn = document.getElementById('modeManualBtn');
        const autoBtn = document.getElementById('modeAutoBtn');
        const autoSync = document.getElementById('autoSyncContainer');

        if (mode === 'manual') {
            manBtn.style.background = 'var(--primary)'; manBtn.style.color = '#fff'; manBtn.style.border = 'none';
            autoBtn.style.background = 'rgba(255,255,255,0.1)'; autoBtn.style.color = 'var(--text-muted)'; autoBtn.style.border = '1px solid rgba(255,255,255,0.1)';
            autoSync.style.display = 'none';
        } else {
            autoBtn.style.background = 'var(--primary)'; autoBtn.style.color = '#fff'; autoBtn.style.border = 'none';
            manBtn.style.background = 'rgba(255,255,255,0.1)'; manBtn.style.color = 'var(--text-muted)'; manBtn.style.border = '1px solid rgba(255,255,255,0.1)';
            autoSync.style.display = 'block';
        }
    };

    window.resetLesson = async function() {
        if(confirm("Är du säker? Detta nollställer elevernas quiz och din panel.")) {
            teacherTime = 0;
            if(teacherTimer) clearInterval(teacherTimer);
            teacherPlaying = false;
            window._lastPushedIndex = -1;
            currentMsgColor = 'none';
            currentMsgText = '';
            await setGlobalQ(-1);
            renderTeacherPanel();
        }
    };

    window.pushMessage = async function(color, text) {
        if(!text.trim()) return;
        currentMsgColor = color;
        currentMsgText = text;
        document.getElementById('customMsgInput').value = '';
        await setGlobalQ(window._lastPushedIndex !== undefined ? window._lastPushedIndex : -1);
        updateMsgUI();
    };

    window.clearMessage = async function() {
        currentMsgColor = 'none';
        currentMsgText = '';
        await setGlobalQ(window._lastPushedIndex !== undefined ? window._lastPushedIndex : -1);
        updateMsgUI();
    };

    window.updateMsgUI = function() {
        const btnRed = document.getElementById('btnMsgRed');
        const btnBlue = document.getElementById('btnMsgBlue');
        const btnCustom = document.getElementById('btnMsgCustom');
        const btnClear = document.getElementById('btnMsgClear');
        if (!btnRed) return;

        // Reset all to default styles
        btnRed.style.opacity = '1';
        btnRed.style.boxShadow = 'none';
        btnRed.innerHTML = '🛑 Var Tysta!';
        
        btnBlue.style.opacity = '1';
        btnBlue.style.boxShadow = 'none';
        btnBlue.innerHTML = '👁 Fokusera!';

        btnCustom.style.opacity = '1';
        btnCustom.style.boxShadow = 'none';
        btnCustom.innerHTML = 'Sänd Custom';

        btnClear.style.opacity = '0.5';

        if (currentMsgColor !== 'none') {
            btnClear.style.opacity = '1';
            btnClear.style.boxShadow = '0 0 10px rgba(255,255,255,0.2)';
            
            if (currentMsgColor === 'red') {
                btnRed.innerHTML = '🛑 AKTIV: Var Tysta!';
                btnRed.style.boxShadow = '0 0 15px rgba(239,68,68,0.8)';
                btnBlue.style.opacity = '0.3';
                btnCustom.style.opacity = '0.3';
            } else if (currentMsgColor === 'blue') {
                btnBlue.innerHTML = '👁 AKTIV: Fokusera!';
                btnBlue.style.boxShadow = '0 0 15px rgba(59,130,246,0.8)';
                btnRed.style.opacity = '0.3';
                btnCustom.style.opacity = '0.3';
            } else if (currentMsgColor === 'dark') {
                btnCustom.innerHTML = '✅ AKTIV: Custom';
                btnCustom.style.boxShadow = '0 0 15px var(--primary)';
                btnRed.style.opacity = '0.3';
                btnBlue.style.opacity = '0.3';
            }
        }
    };

    window.manualPush = async function(idx) {
        // Overrides any existing message
        currentMsgColor = 'none';
        currentMsgText = '';
        updateMsgUI();

        // UI updates for manual mode button
        for (let i = 0; i < questions.length; i++) {
            const btn = document.getElementById(`t-btn-${i}`);
            if(!btn) continue;
            if(i <= idx) {
                btn.innerHTML = '✅ Pushad';
                btn.style.background = 'rgba(255,255,255,0.1)';
                btn.style.borderColor = 'rgba(255,255,255,0.1)';
                btn.style.color = 'var(--text-muted)';
            } else {
                btn.innerHTML = '🚀 Puscha till elever';
                btn.style.background = 'rgba(16,185,129,0.2)';
                btn.style.borderColor = 'rgba(16,185,129,0.5)';
                btn.style.color = '#fff';
            }
        }
        window._lastPushedIndex = idx;
        await setGlobalQ(idx);
    };

    function formatTime(sec) {
        const m = Math.floor(sec / 60).toString().padStart(2, '0');
        const s = (sec % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function updateTimeDisplay() {
        const display = document.getElementById('timeDisplay');
        if(!display) return;
        
        display.textContent = formatTime(teacherTime);
        document.getElementById('timeSlider').value = teacherTime;

        if (teacherMode === 'auto') {
            let activeIndex = -1;
            for (let i = 0; i < qTimestamps.length; i++) {
                if (teacherTime >= qTimestamps[i]) activeIndex = i;
            }

            if (window._lastPushedIndex !== activeIndex && activeIndex !== -1) {
                manualPush(activeIndex); // Reuse UI update logic
                window._lastPushedIndex = activeIndex;
            }
        }
    }

    window.togglePlay = function() {
        teacherPlaying = !teacherPlaying;
        const btn = document.getElementById('playBtn');
        if (teacherPlaying) {
            btn.innerHTML = '⏸️ Paus';
            btn.style.background = 'rgba(255,255,255,0.2)';
            teacherTimer = setInterval(() => {
                teacherTime++;
                updateTimeDisplay();
            }, 1000);
        } else {
            btn.innerHTML = '▶️ Play';
            btn.style.background = 'var(--primary)';
            clearInterval(teacherTimer);
        }
        setGlobalQ(window._lastPushedIndex || -1);
    };

    window.sliderMove = function(val) {
        teacherTime = parseInt(val);
        updateTimeDisplay();
    };

    window.adjustTime = function(delta) {
        teacherTime = Math.max(0, teacherTime + delta);
        updateTimeDisplay();
    };

    window.pushQuestion = async function(idx) {
        // For 'Avsluta lektion' which is 999
        currentMsgColor = 'none';
        currentMsgText = '';
        await setGlobalQ(idx);
    };

    document.addEventListener('keydown', e => {
        if (currentQ < 0 || isSyncMode || isTeacher) return;
        const map = { 'a': 'A', 'b': 'B', 'c': 'C', 'd': 'D', '1': 'A', '2': 'B', '3': 'C', '4': 'D' };
        const val = map[e.key.toLowerCase()];
        if (val && answers[currentQ] === undefined) {
            const opt = document.querySelector(`.opt[data-val="${val}"]`);
            if (opt) selectOption(opt, val);
        }
        if ((e.key === 'Enter' || e.key === ' ') && answers[currentQ] !== undefined) {
            e.preventDefault();
            nextQuestion();
        }
    });
    
    // START APP
    renderIntro();

</script>
</body>
</html>
