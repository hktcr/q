<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: A Life on Our Planet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --bg: #0a0f0a;
            --surface: rgba(30, 41, 59, 0.6);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --correct: #10b981;
            --incorrect: #ef4444;
            --gold: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* === BACKGROUND === */
        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            background: url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=1920&q=80') center/cover no-repeat;
        }
        .bg-layer::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(160deg, rgba(5,10,5,0.92) 0%, rgba(10,20,15,0.82) 100%);
        }

        /* === LAYOUT === */
        .app {
            position: relative; z-index: 1;
            height: 100vh; display: flex;
            flex-direction: column; align-items: center;
            justify-content: center; padding: 1.5rem;
        }

        /* === PROGRESS BAR === */
        .progress-bar-wrap {
            position: fixed; top: 0; left: 0; right: 0;
            height: 6px; background: rgba(255,255,255,0.08); z-index: 10;
        }
        .progress-bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--primary), #34d399);
            border-radius: 0 3px 3px 0;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* === STEP INDICATOR === */
        .step-indicator {
            position: fixed; top: 1.5rem; right: 2rem;
            font-size: 1rem; font-weight: 700;
            color: var(--text-muted); z-index: 10;
            letter-spacing: 1px;
        }
        .step-indicator .current { color: var(--primary); font-size: 1.4rem; }

        /* === CARD === */
        .card {
            width: 100%; max-width: 720px;
            background: rgba(10, 15, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: clamp(2rem, 5vw, 3.5rem);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            transform: translateX(0); opacity: 1;
            transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.35s ease;
        }
        .card.exit-left  { transform: translateX(-120px); opacity: 0; }
        .card.enter-right { transform: translateX(120px); opacity: 0; }

        /* === QUESTION === */
        .q-number {
            font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 3px; color: var(--primary);
            font-weight: 800; margin-bottom: 0.75rem;
        }
        .q-text {
            font-size: clamp(1.15rem, 2.5vw, 1.45rem);
            font-weight: 600; line-height: 1.55;
            margin-bottom: 2rem;
        }

        /* === OPTIONS === */
        .options { display: flex; flex-direction: column; gap: 0.85rem; }

        .opt {
            display: flex; align-items: center; gap: 1rem;
            padding: 1.1rem 1.4rem;
            background: rgba(255,255,255,0.04);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 14px; cursor: pointer;
            font-size: clamp(1rem, 1.8vw, 1.15rem);
            line-height: 1.45;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .opt:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
        .opt.selected { border-color: var(--primary); background: rgba(16,185,129,0.1); }

        .opt .letter {
            flex-shrink: 0; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-weight: 700; font-size: 0.95rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }
        .opt.selected .letter {
            background: var(--primary); color: #fff;
            border-color: var(--primary);
        }

        /* Feedback states */
        .opt.correct-opt {
            border-color: var(--correct) !important;
            background: rgba(16,185,129,0.15) !important;
        }
        .opt.correct-opt .letter {
            background: var(--correct) !important; color: #fff !important;
        }
        .opt.wrong-opt {
            border-color: var(--incorrect) !important;
            background: rgba(239,68,68,0.12) !important;
            opacity: 0.85;
        }
        .opt.wrong-opt .letter {
            background: var(--incorrect) !important; color: #fff !important;
        }
        .opt.dimmed { opacity: 0.4; }

        /* === FEEDBACK === */
        .feedback {
            margin-top: 1.5rem; padding: 1.2rem 1.5rem;
            border-radius: 14px; font-size: 1rem;
            line-height: 1.5; display: none;
            border-left: 4px solid;
            animation: fadeSlideUp 0.4s ease-out;
        }
        .feedback.show { display: block; }
        .feedback.ok  { background: rgba(16,185,129,0.1); border-color: var(--correct); color: #a7f3d0; }
        .feedback.nok { background: rgba(239,68,68,0.1);  border-color: var(--incorrect); color: #fca5a5; }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* === NEXT BUTTON === */
        .next-btn {
            display: none; margin-top: 2rem;
            width: 100%; padding: 1.1rem;
            font-family: inherit; font-size: 1.1rem; font-weight: 700;
            color: #fff; background: var(--primary);
            border: none; border-radius: 14px; cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
            animation: fadeSlideUp 0.4s ease-out;
        }
        .next-btn:hover { background: #059669; transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow); }
        .next-btn.show { display: block; }

        /* === RESULTS SCREEN === */
        .results { text-align: center; }
        .results .emoji { font-size: 4rem; margin-bottom: 1rem; }
        .results h2 {
            font-size: clamp(2rem, 5vw, 3rem); font-weight: 900;
            margin-bottom: 0.5rem;
        }
        .results .score-line {
            font-size: 1.3rem; color: var(--text-muted);
            margin-bottom: 2.5rem;
        }
        .results .score-line strong { color: var(--primary); font-size: 1.6rem; }

        .result-row {
            display: flex; align-items: center; gap: 1rem;
            padding: 0.9rem 1.2rem; border-radius: 12px;
            margin-bottom: 0.6rem; font-size: 1rem;
            text-align: left;
        }
        .result-row.ok  { background: rgba(16,185,129,0.1); }
        .result-row.nok { background: rgba(239,68,68,0.08); }
        .result-icon { font-size: 1.4rem; flex-shrink: 0; }

        .retry-btn {
            margin-top: 2rem; padding: 1rem 3rem;
            font-family: inherit; font-size: 1.1rem; font-weight: 700;
            color: var(--primary); background: transparent;
            border: 2px solid var(--primary); border-radius: 14px;
            cursor: pointer; transition: all 0.25s ease;
        }
        .retry-btn:hover { background: var(--primary); color: #fff; }

        /* === INTRO SCREEN === */
        .intro { text-align: center; }
        .intro .badge {
            display: inline-block; font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 3px;
            color: var(--primary); font-weight: 800;
            margin-bottom: 1rem;
        }
        .intro h1 {
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            font-weight: 900; line-height: 1.15;
            margin-bottom: 0.75rem;
        }
        .intro .sub {
            font-size: 1.15rem; color: var(--text-muted);
            margin-bottom: 2.5rem; line-height: 1.5;
        }
        .intro .meta {
            display: flex; justify-content: center; gap: 2rem;
            margin-bottom: 2.5rem; flex-wrap: wrap;
        }
        .intro .meta-item {
            font-size: 0.9rem; color: var(--text-muted);
        }
        .intro .meta-item strong { color: var(--text); }
        .start-btn {
            padding: 1.1rem 4rem;
            font-family: inherit; font-size: 1.2rem; font-weight: 700;
            color: #fff; background: var(--primary);
            border: none; border-radius: 14px; cursor: pointer;
            transition: all 0.25s ease;
        }
        .start-btn:hover { background: #059669; transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow); }
    </style>
</head>
<body>
    <div class="bg-layer"></div>

    <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div class="step-indicator" id="stepIndicator" style="display:none;">
        <span class="current" id="stepCurrent">1</span> / <span id="stepTotal">6</span>
    </div>

    <div class="app">
        <div class="card" id="card">
            <!-- Filled by JS -->
        </div>
    </div>

    <script>

    const APP_KEY = "HakanLessonLabSync2026";
    const BASE_URL = "https://keyvalue.immanuel.co/api/KeyVal";

const questions = [
    { num: 1, text: "Tjernobylolyckan 1986 är startpunkten i filmen. Vad illustrerar ruinerna av Pripyat enligt David Attenborough?", options: [{letter: "A", text: "Ett fruktansvärt misstag av människan, men också att naturen långsamt tar tillbaka platsen."}, {letter: "B", text: "Att kärnkraft är det enda hållbara energislaget."}, {letter: "C", text: "Att radioaktivitet dödar allt liv permanent."}, {letter: "D", text: "Ett meteoritnedslag som orsakade ett lokalt utdöende."}], correct: "A", feedbackOk: "Helt rätt! Tjernobyl visar hur naturen återhämtar sig när människan försvinner.", feedbackNok: "Rätt svar: <strong>A</strong>. Naturen återvänder." },
    { num: 2, text: "Vad kallar David den stabila tidsperiod (10 000 år) som gjort jordbruk och civilisation möjligt?", options: [{letter: "A", text: "Antropocen"}, {letter: "B", text: "Holocen"}, {letter: "C", text: "Krita"}, {letter: "D", text: "Jura"}], correct: "B", feedbackOk: "Helt rätt! Holocen är vår \"Garden of Eden\".", feedbackNok: "Rätt svar: <strong>Holocen</strong>." },
    { num: 3, text: "Massutdöenden har inträffat fem gånger tidigare i jordens historia. Vad har ofta varit inblandat?", options: [{letter: "A", text: "Rovdjur åt upp alla växtätare."}, {letter: "B", text: "Minskning i insektsantal."}, {letter: "C", text: "Drastiska förändringar av koldioxidhalten i atmosfären."}, {letter: "D", text: "För mycket is på jorden."}], correct: "C", feedbackOk: "Rätt! Plötsliga koldioxidförändringar t.ex. från vulkanism är ofta orsaken.", feedbackNok: "Rätt svar: <strong>C</strong>." },
    { num: 4, text: "När David började resa runt världen kändes naturen oändlig och orörd. Vad var egentligen sant?", options: [{letter: "A", text: "Den var och är fortfarande oändlig."}, {letter: "B", text: "Människan höll redan på att omforma hela planeten i hög takt."}, {letter: "C", text: "Bara haven förändrades."}, {letter: "D", text: "Naturen trängde undan oss."}], correct: "B", feedbackOk: "Rätt! Människan expanderade redan okontrollerat.", feedbackNok: "Rätt svar: <strong>B</strong>." },
    { num: 5, text: "Serengeti är känt för enorma hjordar av växtätare. Hur påverkar de grässlätterna?", options: [{letter: "A", text: "De äter upp allt och gör det till öken."}, {letter: "B", text: "De gödslar marken och håller ekosystemet produktivt."}, {letter: "C", text: "De skrämmer bort alla rovdjur."}, {letter: "D", text: "De trampar sönder alla rötter."}], correct: "B", feedbackOk: "Korrekt! De är vitala för att hålla marken rik.", feedbackNok: "Rätt svar: <strong>B</strong>." },
    { num: 6, text: "Varför är orangutanger så livsviktiga för regnskogens ekosystem på Borneo?", options: [{letter: "A", text: "De äter skadedjur."}, {letter: "B", text: "De bygger bon som skyddar marken."}, {letter: "C", text: "De sprider frön så att skogen kan föröka sig."}, {letter: "D", text: "De jagar andra djur."}], correct: "C", feedbackOk: "Helt rätt! De är regnskogens trädgårdsmästare.", feedbackNok: "Rätt svar: <strong>C</strong>." },
    { num: 7, text: "Vad har hänt med stora delar av Borneos regnskog sedan 1950-talet?", options: [{letter: "A", text: "Den blev reservat."}, {letter: "B", text: "Den frös ihjäl."}, {letter: "C", text: "Hälften höggs ner för artfattiga oljepalmplantager."}, {letter: "D", text: "Djuren åt upp den."}], correct: "C", feedbackOk: "Rätt! Monokultur av palmer har ersatt mångfalden.", feedbackNok: "Rätt svar: <strong>C</strong>." },
    { num: 8, text: "Hur stor andel av massan av alla däggdjur på jorden utgörs idag av VILDA djur?", options: [{letter: "A", text: "50%"}, {letter: "B", text: "30%"}, {letter: "C", text: "15%"}, {letter: "D", text: "Endast 4%"}], correct: "D", feedbackOk: "Korrekt. Vi och våra tamdjur utgör 96% av alla däggdjur i vikt.", feedbackNok: "Rätt svar: <strong>D (4%)</strong>." },
    { num: 9, text: "Vad händer med näringscykeln i havet när vi fiskar ut alla stora rovfiskar?", options: [{letter: "A", text: "Näringen sjunker till djupet och går förlorad för ytan."}, {letter: "B", text: "Det blir mer levande."}, {letter: "C", text: "Det spelar ingen roll."}, {letter: "D", text: "Mer koraller växer."}], correct: "A", feedbackOk: "Precis. Rovdjur pumpar upp näringen igen.", feedbackNok: "Rätt svar: <strong>A</strong>." },
    { num: 10, text: "Hur stor andel av de STORA fiskarna i världshaven har industrifisket tagit bort?", options: [{letter: "A", text: "20%"}, {letter: "B", text: "90%"}, {letter: "C", text: "50%"}, {letter: "D", text: "5%"}], correct: "B", feedbackOk: "Helt rätt. 90% är ett hisnande, tragiskt nummer.", feedbackNok: "Rätt svar: <strong>B (90%)</strong>." },
    { num: 11, text: "Vad är \"korallblekning\" ett tecken på?", options: [{letter: "A", text: "Korallen tvättar sig."}, {letter: "B", text: "Fiskar har ätit upp algerna."}, {letter: "C", text: "Salthalten ökar."}, {letter: "D", text: "Att vattnet är för varmt och korallen stöter bort algerna (zooxanthellerna)."}], correct: "D", feedbackOk: "Rätt! Symbiosen dör och skelettet blir synligt.", feedbackNok: "Rätt svar: <strong>D</strong>." },
    { num: 12, text: "Skogshuggning skapar ett dubbelt problem för klimatet. Hur?", options: [{letter: "A", text: "Koldioxid från maskiner + syre från träd."}, {letter: "B", text: "Människor bygger städer."}, {letter: "C", text: "Trädens lagrade kol frigörs, samtidigt som vi förlorar kolsänkorna som renar luften."}, {letter: "D", text: "Mer ljus och vind på marken."}], correct: "C", feedbackOk: "Korrekt! Vi eldar upp koldioxiden och förstör filtret samtidigt.", feedbackNok: "Rätt svar: <strong>C</strong>." },
    { num: 13, text: "Isarna i Arktis minskar drastiskt. Varför är de så viktiga för planeten?", options: [{letter: "A", text: "De fungerar som speglar som reflekterar solenergi (albedo) och kyler planeten."}, {letter: "B", text: "Isbjörnarna dör."}, {letter: "C", text: "De håller havet salt."}, {letter: "D", text: "De ger sötvatten."}], correct: "A", feedbackOk: "Helt rätt, albedo-effekten kyler jorden.", feedbackNok: "Rätt svar: <strong>A</strong>." },
    { num: 14, text: "Vad innebär minskad albedo-effekt (positiv feedback loop)?", options: [{letter: "A", text: "Mindre is → mer sol absorberas i mörkt vatten → snabbare uppvärmning → ond cirkel."}, {letter: "B", text: "Mörkt vatten kyler ner havet."}, {letter: "C", text: "Kallt vatten kyler jorden."}, {letter: "D", text: "Ingen global effekt."}], correct: "A", feedbackOk: "Exakt. Det accelererar uppvärmningen.", feedbackNok: "Rätt svar: <strong>A</strong>." },
    { num: 15, text: "Om vi fortsätter på inslagen väg går vi genom en serie envägsdörrar. Vad leder det till?", options: [{letter: "A", text: "Svalare jord."}, {letter: "B", text: "Vi förlorar Holocen, triggar 6:e massutdöendet och stora delar av jorden blir obeboelig."}, {letter: "C", text: "Nya roliga ekosystem."}, {letter: "D", text: "Vi flyttar till havet."}], correct: "B", feedbackOk: "Rätt. Det handlar om vår egen civilisations överlevnad.", feedbackNok: "Rätt svar: <strong>B</strong>." }
];

    let currentQ = -1; 
    let answers = {};
    let isSyncMode = false;
    let syncInterval = null;

    const card = document.getElementById('card');
    const progressBar = document.getElementById('progressBar');
    const stepIndicator = document.getElementById('stepIndicator');
    const stepCurrent = document.getElementById('stepCurrent');

    const urlParams = new URLSearchParams(window.location.search);
    const isTeacher = urlParams.get('mode') === 'teacher';

    // === API HELPERS ===
    async function setGlobalQ(qIndex) {
        const state = JSON.stringify({ q: qIndex, p: teacherPlaying });
        await fetch(`${BASE_URL}/UpdateValue/${APP_KEY}/syncState/${encodeURIComponent(state)}`, { method: 'POST', headers: { 'Content-Length': '0' } });
    }

    async function getGlobalQ() {
        try {
            const res = await fetch(`${BASE_URL}/GetValue/${APP_KEY}/syncState`);
            const text = await res.text();
            if(!text || text.includes('not found')) return { q: -1, p: false };
            const state = JSON.parse(decodeURIComponent(text.replace(/"/g, ''))); // keyvalue sometimes adds extra quotes
            return state;
        } catch(e) { return { q: -1, p: false }; }
    }

    async function startSyncMode() {
        isSyncMode = true;
        currentQ = -1;
        answers = {};
        
        card.innerHTML = `
            <div class="intro">
                <div class="badge">Live-Synk Aktiv</div>
                <div class="emoji" id="studentIntroEmoji" style="font-size:4rem; margin:1rem 0;">⏳</div>
                <h1>Gör dig redo</h1>
                <p class="sub" id="studentIntroSub">Väntar på att Håkan ska starta filmen...</p>
            </div>
        `;

        // Start polling
        syncInterval = setInterval(async () => {
            const state = await getGlobalQ();
            
            // Handle Play State UI
            const introSub = document.getElementById('studentIntroSub');
            if (introSub && currentQ === -1) {
                if (state.p) {
                    introSub.innerHTML = '🎬 Filmen är igång! Luta dig tillbaka. Frågorna dyker upp här när det är dags.';
                    document.getElementById('studentIntroEmoji').innerHTML = '🍿';
                } else {
                    introSub.innerHTML = 'Väntar på att Håkan ska starta filmen...';
                    document.getElementById('studentIntroEmoji').innerHTML = '⏳';
                }
            }

            if (state.q === 999) {
                showResults();
                return;
            }

            if (state.q > currentQ && answers[currentQ] !== undefined || (currentQ === -1 && state.q > -1)) {
                currentQ = state.q;
                showQuestion(currentQ);
            } else if (state.q === -1 && currentQ !== -1) {
                // Reset
                currentQ = -1;
                answers = {};
                card.innerHTML = `
                    <div class="intro">
                        <div class="emoji" id="studentIntroEmoji" style="font-size:4rem; margin-bottom:1rem;">⏳</div>
                        <h2>Väntar på Håkan...</h2>
                        <p class="sub" id="studentIntroSub">Quizet har återställts.</p>
                    </div>
                `;
            }
        }, 3000);
    }

    function renderIntro() {
        stepIndicator.style.display = 'none';
        progressBar.style.width = '0%';

        if (isTeacher) {
            renderTeacherPanel();
            return;
        }

        card.innerHTML = `
            <div class="intro">
                <div class="badge">Ekologi & Klimat</div>
                <h1>A Life on Our Planet</h1>
                <p class="sub">Frågor om filmens första del och det vi diskuterat om koraller, ekosystem och klimat.</p>
                <div class="meta" style="flex-direction: column; align-items: center; gap: 1rem;">
                    <button class="start-btn" onclick="startSyncMode()">🔗 Gå med i Lärar-Synk (Live)</button>
                    <button class="retry-btn" style="margin-top:0;" onclick="startSoloMode()">Öva i egen takt</button>
                </div>
            </div>
        `;
    }

    function startSoloMode() {
        isSyncMode = false;
        currentQ = 0;
        answers = {};
        showQuestion(0);
    }

    function showQuestion(idx) {
        stepIndicator.style.display = 'block';
        stepCurrent.textContent = idx + 1;
        progressBar.style.width = ((idx) / questions.length * 100) + '%';

        const q = questions[idx];
        card.classList.add('exit-left');

        setTimeout(() => {
            card.classList.remove('exit-left');
            card.classList.add('enter-right');

            card.innerHTML = `
                <div class="q-number">Fråga ${q.num} av ${questions.length}</div>
                <div class="q-text">${q.text}</div>
                <div class="options" id="opts">
                    ${q.options.map(o => `
                        <div class="opt" data-val="${o.letter}" onclick="selectOption(this, '${o.letter}')">
                            <span class="letter">${o.letter}</span>
                            <span>${o.text}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="feedback" id="fb"></div>
                ${!isSyncMode ? `
                    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
                        ${idx < questions.length - 1 ? 'Nästa Fråga →' : 'Visa Resultat →'}
                    </button>
                ` : `
                    <div id="syncWaitMsg" style="display:none; text-align:center; margin-top:2rem; color:var(--text-muted); font-weight:600;">
                        Svar registrerat! ⏳ Väntar på att filmen ska fortsätta...
                    </div>
                `}
            `;

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    card.classList.remove('enter-right');
                });
            });
        }, 350);
    }

    function selectOption(el, val) {
        if (answers[currentQ] !== undefined) return;

        answers[currentQ] = val;
        const q = questions[currentQ];
        const isCorrect = val === q.correct;

        document.querySelectorAll('.opt').forEach(o => {
            const v = o.dataset.val;
            o.style.cursor = 'default';
            if (v === q.correct) {
                o.classList.add('correct-opt');
            } else if (v === val && !isCorrect) {
                o.classList.add('wrong-opt');
            } else {
                o.classList.add('dimmed');
            }
        });

        const fb = document.getElementById('fb');
        fb.className = 'feedback show ' + (isCorrect ? 'ok' : 'nok');
        fb.innerHTML = isCorrect ? '✓ ' + q.feedbackOk : '✗ ' + q.feedbackNok;

        if (!isSyncMode) {
            document.getElementById('nextBtn').classList.add('show');
        } else {
            document.getElementById('syncWaitMsg').style.display = 'block';
        }
    }

    function nextQuestion() {
        if (currentQ < questions.length - 1) {
            currentQ++;
            showQuestion(currentQ);
        } else {
            showResults();
        }
    }

    function showResults() {
        if(syncInterval) clearInterval(syncInterval);
        progressBar.style.width = '100%';
        stepIndicator.style.display = 'none';

        let totalPossible = Object.keys(answers).length;
        if (totalPossible === 0) {
            card.innerHTML = '<div class="results"><h2>Du svarade inte på några frågor.</h2></div>';
            return;
        }

        let score = 0;
        let resultRows = '';
        
        for(let i=0; i<questions.length; i++) {
            if (answers[i] !== undefined) {
                const q = questions[i];
                const ok = answers[i] === q.correct;
                if (ok) score++;
                resultRows += `<div class="result-row ${ok ? 'ok' : 'nok'}">
                    <span class="result-icon">${ok ? '✓' : '✗'}</span>
                    <span>Fråga ${q.num}: ${ok ? 'Rätt!' : 'Fel — rätt svar: ' + q.correct}</span>
                </div>`;
            }
        }

        let emoji, title;
        const percentage = score / totalPossible;
        if (percentage === 1)               { emoji = '🌟'; title = 'Full pott! Strålande!'; }
        else if (percentage >= 0.6)         { emoji = '💚'; title = 'Bra jobbat!'; }
        else if (percentage >= 0.3)         { emoji = '🌱'; title = 'En bra start!'; }
        else                                { emoji = '📖'; title = 'Dags att repetera!'; }

        card.classList.add('exit-left');
        setTimeout(() => {
            card.classList.remove('exit-left');
            card.classList.add('enter-right');

            card.innerHTML = `
                <div class="results">
                    <div class="emoji">${emoji}</div>
                    <h2>${title}</h2>
                    <p class="score-line">Du fick <strong>${score}</strong> av ${totalPossible} besvarade frågor rätt</p>
                    ${resultRows}
                    ${!isSyncMode ? `<button class="retry-btn" onclick="retry()">Försök igen</button>` : ''}
                </div>
            `;

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    card.classList.remove('enter-right');
                });
            });
        }, 350);
    }

    function retry() {
        currentQ = -1;
        answers = {};
        renderIntro();
    }

    // === TEACHER PANEL ===
    let teacherTime = 0; // in seconds
    let teacherPlaying = false;
    let teacherTimer = null;

    const qTimestamps = [
        3 * 60, 6 * 60, 9 * 60, 12 * 60, 15 * 60, 
        18 * 60, 21 * 60, 24 * 60, 27 * 60, 30 * 60, 
        33 * 60, 36 * 60, 39 * 60, 42 * 60, 45 * 60
    ];

    async function renderTeacherPanel() {
        stepIndicator.style.display = 'none';
        progressBar.style.display = 'none';
        
        await setGlobalQ(-1); // Reset on load

        card.innerHTML = `
            <div class="intro" style="text-align:left;">
                <div class="badge">Lärarpanel</div>
                <h1 style="color:var(--primary); text-align:left; font-size:2rem;">🎬 Timeline-Synk</h1>
                <p class="sub" style="text-align:left; margin-bottom:1rem; font-size:1rem;">
                    Klicka på Play när filmen rullar. Systemet låser automatiskt upp frågorna vid rätt tidsstämpel. Du kan justera tiden manuellt om ni pausat.
                </p>

                <div style="background:rgba(255,255,255,0.05); padding:1.5rem; border-radius:14px; margin-bottom:2rem;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                        <div style="font-size:2.5rem; font-weight:900; font-variant-numeric: tabular-nums;" id="timeDisplay">00:00</div>
                        <div>
                            <button id="playBtn" onclick="togglePlay()" style="background:var(--primary); color:#fff; border:none; padding:0.8rem 1.5rem; border-radius:8px; font-weight:bold; cursor:pointer; font-size:1.1rem;">▶️ Play</button>
                        </div>
                    </div>
                    <div style="display:flex; gap:1rem; align-items:center;">
                        <input type="range" id="timeSlider" min="0" max="2700" value="0" style="flex-grow:1; cursor:pointer;" oninput="sliderMove(this.value)">
                        <button onclick="adjustTime(-30)" style="background:rgba(255,255,255,0.1); border:none; color:#fff; padding:0.5rem; border-radius:6px; cursor:pointer;">-30s</button>
                        <button onclick="adjustTime(30)" style="background:rgba(255,255,255,0.1); border:none; color:#fff; padding:0.5rem; border-radius:6px; cursor:pointer;">+30s</button>
                    </div>
                </div>

                <h3 style="margin-bottom:1rem; color:var(--text-muted); font-size:0.9rem; text-transform:uppercase; letter-spacing:2px;">Automatiska Triggers</h3>
                <div class="options" id="teacherOpts" style="max-height: 250px; overflow-y: auto; padding-right:1rem;">
                    ${questions.map((q, i) => `
                        <div class="opt" id="t-opt-${i}" style="opacity:0.6; pointer-events:none;">
                            <span class="letter">${formatTime(qTimestamps[i])}</span>
                            <span style="font-size:0.95rem;">${q.num}. ${q.text.substring(0, 35)}...</span>
                        </div>
                    `).join('')}
                </div>
                <div class="opt" onclick="pushQuestion(999)" style="margin-top:1.5rem; border-color:var(--incorrect); justify-content:center;">
                    <span>🏁 Tvinga Avslut (Visa Resultat för alla)</span>
                </div>
            </div>
        `;
        
        // Render initial view
        updateTimeDisplay();
    }

    function formatTime(sec) {
        const m = Math.floor(sec / 60).toString().padStart(2, '0');
        const s = (sec % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function updateTimeDisplay() {
        const display = document.getElementById('timeDisplay');
        if(!display) return;
        
        display.textContent = formatTime(teacherTime);
        document.getElementById('timeSlider').value = teacherTime;

        let activeIndex = -1;
        for (let i = 0; i < qTimestamps.length; i++) {
            if (teacherTime >= qTimestamps[i]) {
                activeIndex = i;
            }
        }

        for (let i = 0; i < questions.length; i++) {
            const el = document.getElementById(`t-opt-${i}`);
            if(!el) continue;
            
            if (i <= activeIndex) {
                el.style.opacity = '1';
                el.style.borderColor = 'var(--primary)';
                el.style.background = 'rgba(16,185,129,0.1)';
            } else {
                el.style.opacity = '0.4';
                el.style.borderColor = 'rgba(255,255,255,0.08)';
                el.style.background = 'transparent';
            }
        }

        if (window._lastPushedIndex !== activeIndex) {
            pushQuestion(activeIndex);
            window._lastPushedIndex = activeIndex;
        }
    }

    window.togglePlay = function() {
        teacherPlaying = !teacherPlaying;
        const btn = document.getElementById('playBtn');
        if (teacherPlaying) {
            btn.innerHTML = '⏸️ Paus';
            btn.style.background = 'rgba(255,255,255,0.2)';
            teacherTimer = setInterval(() => {
                teacherTime++;
                updateTimeDisplay();
            }, 1000);
        } else {
            btn.innerHTML = '▶️ Play';
            btn.style.background = 'var(--primary)';
            clearInterval(teacherTimer);
        }
        
        // Push state update so students see "Filmen är igång"
        setGlobalQ(window._lastPushedIndex || -1);
    };

    window.sliderMove = function(val) {
        teacherTime = parseInt(val);
        updateTimeDisplay();
    };

    window.adjustTime = function(delta) {
        teacherTime = Math.max(0, teacherTime + delta);
        updateTimeDisplay();
    };

    window.pushQuestion = async function(idx) {
        await setGlobalQ(idx);
    };

    // Keyboard support for solo mode
    document.addEventListener('keydown', e => {
        if (currentQ < 0 || isSyncMode || isTeacher) return;
        const map = { 'a': 'A', 'b': 'B', 'c': 'C', 'd': 'D', '1': 'A', '2': 'B', '3': 'C', '4': 'D' };
        const val = map[e.key.toLowerCase()];
        if (val && answers[currentQ] === undefined) {
            const opt = document.querySelector(`.opt[data-val="${val}"]`);
            if (opt) selectOption(opt, val);
        }
        if ((e.key === 'Enter' || e.key === ' ') && answers[currentQ] !== undefined) {
            e.preventDefault();
            nextQuestion();
        }
    });
    
    // START APP
    renderIntro();

</script>
</body>
</html>
